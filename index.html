<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pagos Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .transition-all { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[400px] bg-white rounded-[3rem] card-shadow overflow-hidden">
        
        <div id="header-bg" class="bg-[#7dd3fc] p-8 pb-16 text-center relative transition-all">
            
            <div id="logo-container" class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-sm p-3">
                <div id="svg-target" class="w-full h-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-300 w-12 h-12">
                        <rect x="2" y="5" width="20" height="14" rx="2" />
                        <line x1="2" y1="10" x2="22" y2="10" />
                    </svg>
                </div>
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 uppercase shadow-sm active:scale-95 transition-all">
                Inhabilitar foto
            </button>

            <div class="relative w-full max-w-[260px] mx-auto z-10">
                <select id="select-app" onchange="actualizarInterfaz()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-blue-600 text-center shadow-sm outline-none cursor-pointer">
                    <option value="default|#7dd3fc|#1d4ed8">-- Seleccionar App --</option>
                    <option value="nu|#820ad1|#581c87">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1e3a8a">DiDa Préstamos</option>
                    <option value="tala|#10b981|#064e3b">Tala Préstamos</option>
                    <option value="worldmox|#0ea5e9|#075985">WorldmoxPro Cash</option>
                    <option value="movil|#8b5cf6|#4c1d95">Movil Cash</option>
                </select>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#1d4ed8] rounded-2xl p-6 text-left shadow-xl z-20 transition-all">
                <p class="text-white/70 text-[10px] uppercase font-bold mb-1">Monto a pagar</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500">Subproducto</span>
                <select class="text-sm font-bold text-slate-800 bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Intereses</option>
                    <option>Bloqueo de WhatsApp</option>
                    <option>Liquidación Total</option>
                    <option>Abono</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500">Importe</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500">Vencimiento</span>
                <input type="date" class="text-sm font-bold text-slate-400 outline-none bg-transparent">
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-5 text-center border border-slate-100 mt-4">
                <p class="text-[9px] text-slate-400 uppercase font-bold mb-1 tracking-widest">Enlace de Pago</p>
                <p id="display-link" class="text-xs font-mono text-blue-600 font-bold break-all">Aún no generado</p>
            </div>

            <div class="space-y-3 bg-white p-2 rounded-xl">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm border-b pb-1 outline-none">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b pb-1 outline-none">
            </div>

            <button onclick="generarLink()" id="btn-generar" class="w-full bg-[#1d4ed8] text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 uppercase text-xs transition-all">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        let fotoHabilitada = true;

        // DIBUJOS VECTORIALES (SVG) - NUNCA FALLAN
        const logosSVG = {
            'default': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-300 w-12 h-12"><rect x="2" y="5" width="20" height="14" rx="2" /><line x1="2" y1="10" x2="22" y2="10" /></svg>`,
            'nu': `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="45" fill="#820ad1"/><text x="50" y="65" font-family="Arial" font-size="40" font-weight="bold" text-anchor="middle" fill="white">Nu</text></svg>`,
            'dida': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#2563eb"/><text x="50" y="65" font-family="Arial" font-size="30" font-weight="black" text-anchor="middle" fill="white">DIDA</text></svg>`,
            'tala': `<svg viewBox="0 0 100 100" class="w-full h-full"><path d="M50 5 L95 95 L5 95 Z" fill="#10b981"/><text x="50" y="85" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="white">TALA</text></svg>`,
            'worldmox': `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="50" r="45" fill="#0ea5e9"/><path d="M30 50 L70 50 M50 30 L50 70" stroke="white" stroke-width="8"/><text x="50" y="90" font-family="Arial" font-size="12" text-anchor="middle" fill="white">WORLDMOX</text></svg>`,
            'movil': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect x="20" y="10" width="60" height="80" rx="10" fill="#8b5cf6"/><circle cx="50" cy="80" r="5" fill="white"/></svg>`
        };

        function actualizarInterfaz() {
            const select = document.getElementById('select-app');
            const [id, color1, color2] = select.value.split('|');
            
            document.getElementById('header-bg').style.backgroundColor = color1;
            document.getElementById('monto-banner').style.backgroundColor = color2;
            document.getElementById('btn-generar').style.backgroundColor = color2;

            const target = document.getElementById('svg-target');
            if (!fotoHabilitada) {
                target.innerHTML = logosSVG['default'];
                target.style.opacity = "0.2";
            } else {
                target.innerHTML = logosSVG[id] || logosSVG['default'];
                target.style.opacity = "1";
            }
        }

        function toggleFoto() {
            fotoHabilitada = !fotoHabilitada;
            const btn = document.getElementById('btn-foto');
            btn.innerText = fotoHabilitada ? "Inhabilitar foto" : "Habilitar foto";
            btn.classList.toggle('bg-red-500', !fotoHabilitada);
            btn.classList.toggle('text-white', !fotoHabilitada);
            actualizarInterfaz();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString('es-MX', {minimumFractionDigits: 2});
        }

        function generarLink() {
            const ref = "PAY-" + Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('display-link').innerText = "https://pago.mx/" + ref;
            alert("✅ Enlace generado y copiado.");
        }
    </script>
</body>
</html>
