<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pro de Pagos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] bg-white rounded-[3rem] card-shadow overflow-hidden text-slate-800 transition-all duration-500">
        
        <div id="header-bg" class="bg-[#7dd3fc] p-8 pb-16 text-center relative transition-colors duration-500">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden p-2 transition-all">
                <img id="app-logo" src="" class="hidden w-full h-full object-contain" onerror="this.classList.add('hidden'); document.getElementById('logo-placeholder').classList.remove('hidden');">
                <div id="logo-placeholder" class="flex flex-col items-center text-slate-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 hover:bg-white transition uppercase">
                Inhabilitar foto
            </button>

            <div class="relative w-full max-w-[280px] mx-auto z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-blue-600 text-center shadow-sm focus:outline-none cursor-pointer">
                    <option value="default|#7dd3fc|#1d4ed8">Seleccionar Producto</option>
                    <option value="dida|#2563eb|#1e40af">DiDa Prestamos</option>
                    <option value="nu|#820ad1|#5d0796">Prestamos Nu</option>
                    <option value="tala|#0056b3|#003d7a">Tala Prestamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                </select>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#1d4ed8] rounded-2xl p-6 text-left shadow-xl z-20 transition-colors duration-500">
                <p class="text-white/70 text-[10px] uppercase font-bold tracking-widest mb-1">Monto de Préstamo</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full placeholder:text-white/30" value="0.00">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Subproducto</span>
                <select id="subproducto" class="text-sm font-bold text-slate-800 outline-none bg-transparent text-right cursor-pointer">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Bloqueo de WhatsApp</option>
                    <option>Liquidación Total</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Importe a Pagar</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Vencimiento</span>
                <input type="date" id="input-fecha" class="text-sm font-bold text-slate-400 outline-none bg-transparent text-right">
            </div>

            <div class="bg-slate-50 rounded-[2.5rem] p-6 text-center border border-slate-100 mt-4">
                <select id="metodo-pago" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest outline-none bg-transparent mb-1">
                    <option>STP</option>
                    <option>BBVA</option>
                    <option>OXXO</option>
                </select>
                <h3 class="text-2xl font-black text-slate-800 mb-1">Liga de pago</h3>
                <p id="display-link" class="text-[10px] text-slate-400 font-mono truncate px-4">Esperando generación...</p>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-50 space-y-3">
                <input type="text" id="nombre-cliente" placeholder="Nombre del cliente" class="w-full text-sm border-b border-slate-100 pb-1 outline-none">
                <input type="text" id="tel-cliente" placeholder="Teléfono" class="w-full text-sm border-b border-slate-100 pb-1 outline-none">
            </div>

            <button onclick="generateLink()" id="btn-generar" class="w-full bg-[#1d4ed8] text-white font-extrabold py-5 rounded-2xl shadow-lg transition-all active:scale-95 mt-4 uppercase text-xs tracking-widest">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        // LOGOS RESPALDO: Si las URLs fallan, el placeholder entrará en acción
        const logos = {
            'dida': 'https://i.ibb.co/Lzf7vYn/image-46429b.png',
            'nu': 'https://i.ibb.co/mDk0N8R/image-45ecfc.png',
            'tala': 'https://i.ibb.co/vY8N9zX/image-45ec84.png',
            'worldmox': 'https://i.ibb.co/BccC9Rz/image-45e8a1.png'
        };

        let fotoHabilitada = true;

        function updateApp() {
            const select = document.getElementById('select-app');
            const [id, colorLight, colorDark] = select.value.split('|');
            
            document.getElementById('header-bg').style.backgroundColor = colorLight;
            document.getElementById('monto-banner').style.backgroundColor = colorDark;
            document.getElementById('btn-generar').style.backgroundColor = colorDark;

            const logoImg = document.getElementById('app-logo');
            const placeholder = document.getElementById('logo-placeholder');

            if(id === "default" || !fotoHabilitada) {
                logoImg.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } else {
                logoImg.src = logos[id] || '';
                logoImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
        }

        function toggleFoto() {
            fotoHabilitada = !fotoHabilitada;
            const btn = document.getElementById('btn-foto');
            btn.innerText = fotoHabilitada ? "Inhabilitar foto" : "Habilitar foto";
            btn.className = fotoHabilitada ? "bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6" : "bg-red-500 text-white text-[10px] font-bold px-4 py-1.5 rounded-full mb-6";
            updateApp();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + val;
        }

        function generateLink() {
            const link = "https://pago.mx/ref-" + Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('display-link').innerText = link;
            alert("Enlace generado con éxito");
        }
    </script>
</body>
</html>
