<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orden de Pago</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; }
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .card { width: 90%; max-width: 420px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 40px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; margin: 20px 0; }
        video::-webkit-media-controls { display:none !important; }

        /* Contenedor del Logo Dinámico */
        .logo-box {
            width: 70px; height: 70px; background: white; border-radius: 20px;
            margin: 0 auto 15px auto; display: flex; align-items: center;
            justify-content: center; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://cdn.pixabay.com/video/2019/07/26/25696-351221711_large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <div id="header-color" style="background-color: #14b8a6; color: white; padding: 30px 20px; text-align: center; transition: background 0.5s;">
            <div class="logo-box">
                <img id="img-final" src="">
            </div>
            <p style="font-size: 10px; font-weight: 800; letter-spacing: 1.5px; margin: 0; text-transform: uppercase;">Orden de Pago</p>
            <h1 id="txt-prod" style="font-size: 24px; font-weight: 900; margin: 5px 0 0 0; text-transform: uppercase;">CARGANDO...</h1>
        </div>

        <div style="padding: 25px;">
            <div style="background-color: #f9fafb; border-radius: 35px; padding: 25px 15px; text-align: center; border: 1px solid #f1f5f9; margin-bottom: 20px;">
                <p style="font-size: 9px; font-weight: 800; color: #9ca3af; margin: 0; text-transform: uppercase;">Monto Total a Pagar</p>
                <h2 id="txt-monto" style="font-size: 48px; font-weight: 900; color: #0d9488; margin: 5px 0 0 0;">$0.00</h2>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 10px 0;">
                    <span style="font-size: 10px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">Nombre del Cliente</span>
                    <span id="txt-nom" style="font-size: 13px; font-weight: 900; color: #1e293b; text-transform: uppercase;">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 10px 0;">
                    <span style="font-size: 10px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">Número de Teléfono</span>
                    <span id="txt-tel" style="font-size: 13px; font-weight: 900; color: #1e293b;">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 10px 0;">
                    <span style="font-size: 10px; font-weight: 800; color: #9ca3af; text-transform: uppercase;">Fecha de Vencimiento</span>
                    <span id="txt-fec" style="font-size: 13px; font-weight: 900; color: #1e293b;">-</span>
                </div>
            </div>

            <div style="background-color: #fff1f1; border: 1px solid #fee2e2; border-radius: 15px; padding: 15px; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 9px; font-weight: 800; color: #ef4444; text-transform: uppercase;">La liga expira en:</span>
                    <span id="timer" style="font-size: 22px; font-weight: 900; color: #ef4444;">29:51</span>
                </div>
            </div>

            <div onclick="copiarTexto('txt-clabe')" style="background-color: #f0f7ff; border: 1px solid #e0f2fe; border-radius: 30px; padding: 20px; text-align: center; cursor: pointer;">
                <p id="txt-banco-label" style="font-size: 9px; font-weight: 800; color: #3b82f6; margin: 0; text-transform: uppercase;">TRANSFERENCIA (SPEI)</p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 6px; margin: 5px 0;">
                    <span id="txt-clabe" style="font-size: 22px; font-weight: 900; color: #2563eb;">-</span>
                </div>
            </div>

            <button onclick="copiarEnlace()" style="width: 100%; background-color: #1e293b; color: white; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 13px; border: none; margin-top: 20px; cursor: pointer; text-transform: uppercase;">
                Copiar Link de Pago
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // RECIBIR LOGO Y COLOR DESDE EL GENERADOR
        const logoRecibido = urlParams.get('lg') || "https://i.ibb.co/qF6Vvqy/tala-te-presta.png";
        const colorRecibido = "#820ad1"; // Color morado NU por defecto si se elige NU

        // APLICAR LOGO
        document.getElementById('img-final').src = logoRecibido;

        // APLICAR COLOR SI ES NU (O CUALQUIERA QUE ENVÍES)
        // Nota: El generador envía el nombre. Si el nombre es NU, pintamos de morado.
        const nombreApp = urlParams.get('pr') || "TALA PRÉSTAMOS";
        if (nombreApp.includes("NU")) {
            document.getElementById('header-color').style.backgroundColor = "#820ad1";
            document.getElementById('txt-monto').style.color = "#820ad1";
        }

        document.getElementById('txt-prod').innerText = nombreApp;
        document.getElementById('txt-monto').innerText = "$" + (urlParams.get('m') || "0.00");
        document.getElementById('txt-nom').innerText = (urlParams.get('n') || "Cliente").toUpperCase();
        document.getElementById('txt-tel').innerText = urlParams.get('t') || "0000000000";
        document.getElementById('txt-fec').innerText = urlParams.get('f') || "2026-03-09";
        document.getElementById('txt-clabe').innerText = urlParams.get('cl') || "000000000000000000";
        document.getElementById('txt-banco-label').innerText = "TRANSFERENCIA " + (urlParams.get('b') || "MERCADO PAGO") + " (SPEI)";

        // Lógica del Timer
        const start = parseInt(urlParams.get('s')) || Date.now();
        function updateTimer() {
            const diff = (30 * 60 * 1000) - (Date.now() - start);
            if (diff <= 0) { document.getElementById('timer').innerText = "00:00"; return; }
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        function copiarTexto(id) {
            const texto = document.getElementById(id).innerText;
            navigator.clipboard.writeText(texto);
            alert("Copiado: " + texto);
        }
        function copiarEnlace() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link de pago copiado.");
        }
    </script>
</body>
</html>
