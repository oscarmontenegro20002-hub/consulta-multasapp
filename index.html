<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pagos | Tala Actualizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .transition-all { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] bg-white rounded-[3rem] card-shadow overflow-hidden">
        
        <div id="header-bg" class="bg-[#0d9488] p-8 pb-16 text-center relative transition-all">
            
            <div id="logo-container" class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden transition-all">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/20 text-[10px] font-bold px-4 py-1.5 rounded-full text-white mb-6 hover:bg-white/30 uppercase shadow-sm active:scale-95 transition-all">
                Inhabilitar foto
            </button>

            <div class="relative z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-slate-800 shadow-lg outline-none cursor-pointer appearance-none text-center">
                    <option value="tala|#0d9488|#0f766e">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1d4ed8">DiDa Préstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                </select>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#0f766e] rounded-2xl p-6 text-left shadow-xl z-20 transition-all">
                <p class="text-white/70 text-[10px] uppercase font-bold tracking-widest mb-1">Monto de Pago</p>
                <div class="flex items-center text-white">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-4xl font-bold outline-none w-full placeholder:text-white/20">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-4 text-slate-800">
            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500 font-medium">Subproducto</span>
                <select class="text-sm font-bold text-slate-800 bg-transparent outline-none cursor-pointer">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Liquidación Total</option>
                    <option>Paz y Salvo</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500 font-medium">Importe a Pagar</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-6 text-center border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Referencia Generada</p>
                <p id="display-link" class="text-xs font-mono font-bold text-blue-600">https://pago.mx/REF-XXXX</p>
            </div>

            <div class="space-y-3 pt-2">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm border-b pb-2 outline-none focus:border-teal-500">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b pb-2 outline-none focus:border-teal-500">
            </div>

            <button onclick="generar()" id="btn-main" class="w-full bg-[#0f766e] text-white font-extrabold py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        let fotoHabilitada = true;
        const logos = {
            'tala': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png', // Imagen exacta que pasaste
            'nu': 'https://i.ibb.co/Lzf7vYn/image-45ecfc.png',
            'dida': 'https://i.ibb.co/BccC9Rz/image-46429b.png',
            'worldmox': 'https://i.ibb.co/VvzM47m/image-45e8a1.png'
        };

        function updateApp() {
            const [id, c1, c2] = document.getElementById('select-app').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-banner').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;

            const logoImg = document.getElementById('app-logo');
            if(fotoHabilitada) {
                logoImg.src = logos[id];
                logoImg.style.display = 'block';
            } else {
                logoImg.style.display = 'none';
            }
        }

        function toggleFoto() {
            fotoHabilitada = !fotoHabilitada;
            document.getElementById('btn-foto').innerText = fotoHabilitada ? "Inhabilitar foto" : "Habilitar foto";
            updateApp();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function generar() {
            const ref = Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('display-link').innerText = "https://pago.mx/REF-" + ref;
            alert("✅ Liga generada con éxito.");
        }

        updateApp(); // Carga Tala por defecto
    </script>
</body>
</html>
