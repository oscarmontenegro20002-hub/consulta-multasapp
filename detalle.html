<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orden de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card-detalle { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; }
        .timer-red { color: #ef4444; font-weight: 800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="card-detalle shadow-2xl">
        <div id="header-color" class="bg-[#14b8a6] text-white pt-10 pb-8 text-center px-6">
            <span class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-80">Orden de Pago</span>
            <h1 id="display-producto" class="text-3xl font-black mt-2 uppercase">TALA PRÉSTAMOS</h1>
        </div>

        <div class="p-8 space-y-6">
            <div class="bg-gray-50 rounded-[2rem] p-8 text-center border border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase block mb-2 tracking-widest">Monto Total a Pagar</span>
                <div class="text-4xl font-black text-[#0d9488]" id="display-monto">$0.00</div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Nombre del Cliente</span>
                    <span id="display-nombre" class="text-sm font-bold text-gray-800 uppercase">---</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-100 pb-3">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Fecha de Vencimiento</span>
                    <span id="display-fecha" class="text-sm font-bold text-gray-800">---</span>
                </div>
                
                <div class="bg-red-50 rounded-2xl p-4 border border-red-100">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-red-600 uppercase">La liga expira en:</span>
                        <span id="timer" class="timer-red text-lg">30:00</span>
                    </div>
                    <p class="text-[10px] leading-tight text-red-600 mt-2 font-semibold" style="color: #ef4444 !important; display: block !important;">
                        * Al llegar a 0, se cobrarán <span class="font-black">$500.00 pesos adicionales</span> por concepto de vencimiento de liga de pago.
                    </p>
                </div>
            </div>

            <div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center space-y-2">
                <span id="display-banco-label" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">TRANSFERENCIA (SPEI)</span>
                <div id="display-clabe" class="text-xl font-black text-blue-700 tracking-wider">000000000000000000</div>
                <p class="text-[10px] italic text-blue-400">Referencia: Pago de Multa</p>
            </div>

            <button onclick="copiarAlPortapapeles()" class="w-full bg-[#1e293b] text-white font-bold py-5 rounded-[1.5rem] uppercase text-[11px] tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-transform">
                COPIAR LINK DE PAGO
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const startTime = parseInt(params.get('start')) || Date.now();
        
        // Cargar datos
        document.getElementById('display-monto').innerText = "$" + (params.get('monto') || "0.00");
        document.getElementById('display-nombre').innerText = params.get('nombre') || "Cliente";
        document.getElementById('display-fecha').innerText = params.get('fecha') || "---";
        document.getElementById('display-producto').innerText = params.get('prod') || "TALA PRÉSTAMOS";
        document.getElementById('display-clabe').innerText = params.get('clabe') || "";
        document.getElementById('display-banco-label').innerText = `TRANSFERENCIA ${params.get('banco') || 'MERCADO PAGO'} (SPEI)`;

        // Lógica del Cronómetro
        const duracionTotal = 30 * 60 * 1000; 
        function actualizarTimer() {
            const ahora = Date.now();
            const restante = duracionTotal - (ahora - startTime);

            if (restante <= 0) {
                document.getElementById('timer').innerText = "00:00";
                clearInterval(intervalo);
            } else {
                const m = Math.floor(restante / 60000);
                const s = Math.floor((restante % 60000) / 1000);
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
            }
        }
        const intervalo = setInterval(actualizarTimer, 1000);
        actualizarTimer();

        function copiarAlPortapapeles() {
            navigator.clipboard.writeText(window.location.href);
            alert("¡Link copiado correctamente!");
        }
    </script>
</body>
</html>
