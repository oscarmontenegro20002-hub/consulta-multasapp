<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; }
        .timer-red { color: #ef4444; font-weight: 800; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="card shadow-2xl">
        <div id="header-color" class="bg-[#14b8a6] text-white pt-10 pb-8 text-center px-6">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">Orden de Pago</span>
            <h1 id="display-producto" class="text-3xl font-black mt-2 uppercase">PRODUCTO</h1>
        </div>
        <div class="p-8 space-y-6">
            <div class="bg-gray-50 rounded-[2rem] p-8 text-center border border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase block mb-2">Monto Total a Pagar</span>
                <div class="text-4xl font-black text-[#0d9488]" id="display-monto">$0.00</div>
            </div>
            <div class="space-y-4 text-sm font-bold">
                <div class="flex justify-between border-b pb-3">
                    <span class="text-gray-400 uppercase text-[10px]">Nombre del Cliente</span>
                    <span id="display-nombre">Cargando...</span>
                </div>
                <div class="flex justify-between border-b pb-3">
                    <span class="text-gray-400 uppercase text-[10px]">Fecha de Vencimiento</span>
                    <span id="display-fecha">---</span>
                </div>
                <div class="bg-red-50 rounded-2xl p-4 border border-red-100">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-red-600 uppercase">La liga expira en:</span>
                        <span id="timer" class="timer-red text-lg">30:00</span>
                    </div>
                </div>
            </div>
            <div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center">
                <span id="display-banco-label" class="text-[10px] font-bold text-blue-500 uppercase">TRANSFERENCIA</span>
                <div id="display-clabe" class="text-xl font-black text-blue-700">000000000000000000</div>
            </div>
            <button onclick="copiarLink()" class="w-full bg-[#1e293b] text-white font-bold py-5 rounded-[1.5rem] uppercase text-xs tracking-widest">Copiar Link de Pago</button>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const startTime = parseInt(params.get('start')) || Date.now();
        document.getElementById('display-monto').innerText = "$" + (params.get('monto') || "0.00");
        document.getElementById('display-nombre').innerText = params.get('nombre') || "Cliente";
        document.getElementById('display-fecha').innerText = params.get('fecha') || "---";
        document.getElementById('display-producto').innerText = params.get('prod') || "ORDEN";
        document.getElementById('display-clabe').innerText = params.get('clabe') || "";
        
        const duracion = 30 * 60 * 1000; 
        function update() {
            const r = duracion - (Date.now() - startTime);
            if(r <= 0) { document.getElementById('timer').innerText = "00:00"; return; }
            const m = Math.floor(r/60000), s = Math.floor((r%60000)/1000);
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }
        setInterval(update, 1000); update();
        function copiarLink() { navigator.clipboard.writeText(window.location.href); alert("Copiado"); }
    </script>
</body>
</html>
