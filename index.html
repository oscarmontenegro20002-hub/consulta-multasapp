<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Ligas Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #1e293b; }
        .main-card { background: white; border-radius: 3rem; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5); width: 100%; max-width: 420px; }
        .input-field { width: 100%; border-bottom: 2px solid #f1f5f9; padding: 10px 0; outline: none; transition: 0.3s; font-weight: 600; font-size: 14px; }
        .input-field:focus { border-color: #3b82f6; }
        .label-mini { text-transform: uppercase; font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 0.05em; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="main-card overflow-hidden">
        <div id="header-color" class="p-8 pb-20 text-center relative transition-all duration-500 bg-[#0d9488]">
            
            <div class="w-24 h-24 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl overflow-hidden">
                <img id="logo-img" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>

            <select id="app-selector" onchange="updateUI()" class="w-full bg-white/20 border border-white/30 text-white rounded-2xl px-4 py-3 font-bold text-sm outline-none backdrop-blur-md cursor-pointer">
                <option value="tala|#0d9488" class="text-slate-800">Tala Préstamos</option>
                <option value="nu|#820ad1" class="text-slate-800">Préstamos Nu</option>
                <option value="dida|#2563eb" class="text-slate-800">DiDa Préstamos</option>
                <option value="worldmox|#0284c7" class="text-slate-800">WorldmoxPro Cash</option>
                <option value="movil|#7c3aed" class="text-slate-800">Movil Cash</option>
            </select>

            <div class="absolute -bottom-10 left-8 right-8 bg-white rounded-[2rem] p-6 shadow-2xl border border-slate-50">
                <p class="label-mini mb-1">Monto de Pago</p>
                <div class="flex items-center">
                    <span class="text-3xl font-black text-slate-800 mr-1">$</span>
                    <input type="number" id="monto-input" oninput="syncData()" placeholder="0.00" class="text-3xl font-black text-slate-800 w-full outline-none placeholder:text-slate-100">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-10 space-y-5">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-mini">Vencimiento</label>
                    <input type="date" id="fecha-venc" onchange="calcularDias()" class="input-field text-blue-600">
                </div>
                <div>
                    <label class="label-mini">Días restantes</label>
                    <div id="dias-display" class="pt-2 text-lg font-black text-slate-700">0</div>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <div>
                    <label class="label-mini">Subproducto</label>
                    <select class="input-field">
                        <option>Multa</option>
                        <option>Recargo</option>
                        <option>Liquidación Total</option>
                    </select>
                </div>
