<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Liga de Pago | Asesor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        select { appearance: none; cursor: pointer; background: transparent; }
        .transition-theme { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] bg-white rounded-[3rem] card-shadow overflow-hidden text-slate-800 transition-theme">
        
        <div id="header-bg" class="bg-[#7dd3fc] p-8 pb-16 text-center relative transition-theme">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden p-1 transition-all">
                <img id="app-logo" src="" class="hidden w-full h-full object-contain">
                <div id="logo-placeholder" class="flex flex-col items-center text-slate-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 hover:bg-white transition shadow-sm uppercase tracking-tighter">
                Inhabilitar foto
            </button>

            <div class="relative w-full max-w-[280px] mx-auto z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-blue-600 text-center shadow-sm focus:outline-none transition-all">
                    <option value="default|#7dd3fc|#1d4ed8">Producto</option>
                    <option value="dida|#2563eb|#1e40af">DiDa Prestamos</option>
                    <option value="nu|#820ad1|#5d0796">Prestamos Nu</option>
                    <option value="tala|#0056b3|#003d7a">Tala Prestamos</option>
                    <option value="prestamos|#334155|#0f172a">Prestamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                    <option value="rapidos|#f43f5e|#be123c">Prestamos Rapidos</option>
                    <option value="movil|#8b5cf6|#5b21b6">Movil Cash</option>
                    <option value="talacredito|#10b981|#047857">Tala Crédito</option>
                </select>
                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-blue-600 text-[10px]">▼</div>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#1d4ed8] rounded-2xl p-6 text-left shadow-xl z-20 transition-theme">
                <p class="text-white/70 text-[10px] uppercase font-bold tracking-widest mb-1">Monto de Préstamo</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full placeholder:text-white/20" value="0.00">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4 text-slate-800">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Subproducto</span>
                <div class="relative">
                    <select class="text-sm font-bold text-slate-800 pr-5 outline-none bg-transparent text-right">
                        <option>Multa</option>
                        <option>Recargo</option>
                        <option>Intereses</option>
                        <option>Bloqueo de whats app</option>
                        <option>Paz y Salvo</option>
                        <option>Evasivo de pago</option>
                        <option>Credito</option>
                        <option>Cooperacion</option>
                        <option>Incumplimiento</option>
                        <option>Certificado</option>
                        <option>Liquidacion Total</option>
                        <option>Abono</option>
                    </select>
                    <span class="absolute right-0 top-1 text-[8px] text-slate-400">▼</span>
                </div>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Importe a Pagar</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Fecha Vencimiento</span>
                <input type="date" id="input-fecha" oninput="formatDateDisplay()" class="text-sm font-bold text-slate-400 outline-none bg-transparent text-right w-32">
            </div>

            <div class="flex justify-between items-center pb-2">
                <span class="text-[11px] text-slate-400 uppercase font-bold tracking-tighter">Vencimiento Formateado</span>
                <span id="display-fecha-larga" class="text-[11px] text-blue-500 font-bold italic">Selecciona fecha</span>
            </div>

            <div class="bg-slate-50 rounded-[2.5rem] p-6 text-center border border-slate-100 mt-4 transition-all">
                <div class="relative inline-block mb-1">
                    <select class="text-[10px] text-slate-400 uppercase font-bold tracking-widest outline-none bg-transparent">
                        <option>Método de pago</option>
                        <option>STP</option>
                        <option>BBVA</option>
                        <option>Bancolombia</option>
                        <option>Nequi</option>
                        <option>Daviplata</option>
                        <option>Dep. contabilidad S.A de C.V</option>
                    </select>
                    <span class="ml-1 text-[8px] text-slate-400">▼</span>
                </div>
                <h3 class="text-2xl font-black text-slate-800 mb-1">Liga de pago</h3>
                <p id="display-link" class="text-[10px] text-slate-400 font-mono truncate px-4 tracking-tighter">0000000000</p>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-50 space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-1">
                    <label class="text-sm text-slate-800 font-semibold">Nombre</label>
                    <input type="text" placeholder="Nombre del cliente" class="text-right text-sm outline-none text-slate-500 w-1/2 bg-transparent placeholder:text-slate-200">
                </div>
                <div class="flex justify-between items-center border-b border-slate-100 pb-1">
                    <label class="text-sm text-slate-800 font-semibold">Teléfono</label>
                    <input type="text" placeholder="55 0000 0000" class="text-right text-sm outline-none text-slate-500 w-1/2 bg-transparent placeholder:text-slate-200">
                </div>
            </div>

            <button id="btn-generar" onclick="generateLink()" class="w-full bg-[#1d4ed8] text-white font-extrabold py-5 rounded-2xl shadow-lg transition-theme active:scale-95 mt-4 uppercase text-xs tracking-[0.2em]">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        // URLs de los logos actualizadas para usar Clearbit (más fiables y permanentes)
        const logos = {
            'dida': 'https://logo.clearbit.com/dida.com',
            'nu': 'https://logo.clearbit.com/nu.com.mx',
            'tala': 'https://logo.clearbit.com/tala.co',
            'prestamos': 'https://logo.clearbit.com/prestamos.mx',
            'worldmox': 'https://logo.clearbit.com/worldmox.com',
            'rapidos': 'https://logo.clearbit.com/prestamosrapidos.mx',
            'movil': 'https://logo.clearbit.com/movilcash.com',
            'talacredito': 'https://logo.clearbit.com/talacredito.com'
        };

        let fotoHabilitada = true;

        function updateApp() {
            const select = document.getElementById('select-app');
            const [id, colorLight, colorDark] = select.value.split('|');
            
            document.getElementById('header-bg').style.backgroundColor = colorLight;
            document.getElementById('monto-banner').style.backgroundColor = colorDark;
            document.getElementById('btn-generar').style.backgroundColor = colorDark;

            const logoImg = document.getElementById('app-logo');
            const placeholder = document.getElementById('logo-placeholder');

            if(id === "default" || !fotoHabilitada) {
                logoImg.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } else {
                placeholder.classList.add('hidden');
                logoImg.classList.remove('hidden');
                logoImg.src = logos[id] || '';
            }
        }

        function toggleFoto() {
            fotoHabilitada = !fotoHabilitada;
            const btn = document.getElementById('btn-foto');
            const container = document.getElementById('logo-container');
            
            if(fotoHabilitada) {
                btn.innerText = "Inhabilitar foto";
                btn.classList.remove('bg-red-500', 'text-white');
                btn.classList.add('bg-white/90', 'text-slate-500');
                container.style.opacity = "1";
            } else {
                btn.innerText = "Habilitar foto";
                btn.classList.remove('bg-white/90', 'text-slate-500');
                btn.classList.add('bg-red-500', 'text-white');
                container.style.opacity = "0.3";
            }
            updateApp();
        }

        function formatDateDisplay() {
            const fechaInput = document.getElementById('input-fecha').value;
            if(!fechaInput) return;
            
            const opciones = { day: '2-digit', month: 'long', year: 'numeric' };
            const fecha = new Date(fechaInput + 'T00:00:00');
            const formateada = fecha.toLocaleDateString('es-MX', opciones);
            
            document.getElementById('display-fecha-
