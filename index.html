<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #0b1120; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        #login-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://img.freepik.com/foto-gratis/fondo-luces-bokeh-dorado-abstracto_23-2148413465.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .login-card { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 3rem 2.5rem; 
            border-radius: 3rem; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #main-app { display: none; }
        .card-container { 
            width: 100%; 
            max-width: 440px; 
            background: white; 
            border-radius: 2.5rem; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            position: relative; 
            z-index: 10; 
        }
        .monto-box { border-radius: 1.5rem; padding: 1rem 1.5rem; margin: 1rem 1.5rem 0 1.5rem; position: relative; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.2rem; line-height: 1; }
        .error-msg { color: #ef4444; font-size: 12px; font-weight: 600; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-bg"></div>

    <div id="login-screen" class="px-4 w-full flex justify-center">
        <div class="login-card">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Bienvenido</h2>
            <p class="text-slate-500 font-medium mb-10">Ingresa tus credenciales para acceder</p>
            
            <div class="space-y-5">
                <input type="text" id="user" placeholder="Usuario" class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/50 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/50 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium">
                
                <div id="login-error" class="error-msg text-center">Usuario o contraseña incorrectos</div>
                
                <button onclick="acceder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-600/20 active:scale-95 transition-all mt-4 uppercase tracking-widest text-sm">
                    Entrar al Sistema
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="card-container">
        <div id="header-bg" class="bg-[#14b8a6] pt-8 pb-4">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-6 mb-2">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 text-sm font-bold text-center outline-none backdrop-blur-md">
                    <option value="tala|#14b8a6|#0d9488" class="text-black">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87" class="text-black">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8" class="text-black">DidaPréstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1" class="text-black">Worldmoxpro Cash GG</option>
                    <option value="movil|#8b5cf6|#6d28d9" class="text-black">Movil Cash</option>
                </select>
            </div>
            <div id="monto-card-bg" class="monto-box bg-[#0d
