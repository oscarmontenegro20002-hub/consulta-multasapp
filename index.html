<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pagos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .app-card { background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 380px; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="app-card">
        <div id="header-bg" class="bg-[#1e40af] p-8 pb-14 text-center relative transition-all">
            
            <div class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg p-2">
                <div id="logo-svg" class="w-full h-full flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" class="w-12 h-12"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                </div>
            </div>

            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/20 text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase mb-4 hover:bg-white/40">
                Inhabilitar Foto
            </button>

            <div class="relative z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-slate-800 shadow-md outline-none cursor-pointer appearance-none text-center">
                    <option value="default|#1e40af|#1e3a8a">-- Seleccionar Producto --</option>
                    <option value="nu|#820ad1|#4c0577">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1d4ed8">DiDa Préstamos</option>
                    <option value="tala|#00d3a1|#00a37d">Tala Préstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                    <option value="movil|#8b5cf6|#6d28d9">Movil Cash</option>
                    <option value="rapidos|#ef4444|#b91c1c">Préstamos Rápidos</option>
                </select>
            </div>

            <div id="monto-bg" class="absolute -bottom-10 left-6 right-6 bg-[#1e3a8a] rounded-2xl p-6 text-left shadow-xl transition-all">
                <p class="text-white/70 text-[10px] uppercase font-bold tracking-widest">Monto de Pago</p>
                <div class="flex items-center text-white">
                    <span class="text-4xl font-bold">$</span>
                    <input type="number" id="input-monto" oninput="actualizarMonto()" placeholder="0.00" class="bg-transparent text-4xl font-bold outline-none w-full placeholder:text-white/20">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-5">
            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400">Subproducto</span>
                <select class="text-sm font-bold text-slate-700 bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Liquidación Total</option>
                </select>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400">Importe a Pagar</span>
                <span id="display-monto" class="text-sm font-bold text-slate-700">$0.00</span>
            </div>

            <div class="bg-slate-50 rounded-3xl p-6 text-center border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Liga de Pago</p>
                <p id="display-link" class="text-xs font-mono font-bold text-blue-600 truncate">Esperando generación...</p>
            </div>

            <div class="space-y-3">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm border-b pb-1 outline-none focus:border-blue-500">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b pb-1 outline-none focus:border-blue-500">
            </div>

            <button onclick="generar()" id="btn-main" class="w-full bg-[#1e3a8a] text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        let fotoVisible = true;

        const logos = {
            'nu': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="25" fill="#820ad1"/><text x="50" y="65" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="white">nu</text></svg>`,
            'dida': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="25" fill="#2563eb"/><path d="M30 30h20a20 20 0 010 40H30V30z" fill="none" stroke="white" stroke-width="8"/><text x="55" y="62" font-family="Arial" font-size="25" font-weight="bold" fill="white">Dida</text></svg>`,
            'tala': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="25" fill="#00d3a1"/><text x="50" y="55" font-family="Arial" font-size="22" font-weight="900" text-anchor="middle" fill="white">TALA</text><path d="M20 70 q30 -15 60 0" stroke="white" stroke-width="5" fill="none"/></svg>`,
            'worldmox': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="25" fill="#0ea5e9"/><text x="50" y="60" font-family="Arial" font-size="45" font-weight="900" text-anchor="middle" fill="white">W</text></svg>`,
            'movil': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="25" fill="#8b5cf6"/><circle cx="50" cy="45" r="15" fill="white"/><rect x="35" y="65" width="30" height="10" rx="5" fill="white"/></svg>`,
            'default': `<svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" class="w-12 h-12"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>`
        };

        function updateApp() {
            const [id, c1, c2] = document.getElementById('select-app').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
            
            const container = document.getElementById('logo-svg');
            if(fotoVisible) {
                container.innerHTML = logos[id] || logos['default'];
                container.style.opacity = "1";
            } else {
                container.innerHTML = logos['default'];
                container.style.opacity = "0.2";
            }
        }

        function toggleFoto() {
            fotoVisible = !fotoVisible;
            document.getElementById('btn-foto').innerText = fotoVisible ? "Inhabilitar Foto" : "Habilitar Foto";
            updateApp();
        }

        function actualizarMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-monto').innerText = "$" + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function generar() {
            const ref = Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('display-link').innerText = "https://pago.mx/ref-" + ref;
            alert("✅ Liga de pago generada correctamente.");
        }
    </script>
</body>
</html>
