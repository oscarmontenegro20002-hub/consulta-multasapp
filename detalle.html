<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orden de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .pago-card { width: 100%; max-width: 420px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        /* ESTO FUERZA EL RECUADRO ROSADO */
        .bloque-alerta {
            background-color: #fff1f1 !important;
            border: 2px solid #fee2e2 !important;
            border-radius: 1.5rem !important;
            padding: 20px !important;
            margin: 20px 0 !important;
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="pago-card">
        <div class="bg-[#14b8a6] text-white pt-10 pb-8 text-center px-6">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">Orden de Pago</span>
            <h1 id="p-prod" class="text-3xl font-black mt-2 uppercase tracking-tight">TALA PRÉSTAMOS</h1>
        </div>

        <div class="p-8 space-y-6">
            <div class="bg-slate-50 rounded-[2rem] p-8 text-center border border-slate-100">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Monto Total a Pagar</span>
                <div class="text-5xl font-black text-[#0d9488]" id="p-monto">$0.00</div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <span class="text-[11px] font-bold text-slate-400 uppercase">Cliente</span>
                    <span id="p-nom" class="text-sm font-black text-slate-800 uppercase">Cargando...</span>
                </div>

                <div class="bloque-alerta">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-red-600 uppercase">La liga expira en:</span>
                        <span id="p-timer" class="text-2xl font-black text-red-600">30:00</span>
                    </div>
                    <p style="color: #ef4444; font-size: 12px; line-height: 1.5; margin-top: 15px; font-weight: 700; display: block !important;">
                        * Al llegar a 0, se cobrará una penalización de <span style="text-decoration: underline;">$500.00 pesos adicionales</span> por concepto de vencimiento de liga de pago.
                    </p>
                </div>
            </div>

            <div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center">
                <span id="p-banco" class="text-[10px] font-bold text-blue-500 uppercase block mb-2">TRANSFERENCIA (SPEI)</span>
                <div id="p-clabe" class="text-2xl font-black text-blue-700 tracking-tighter">000000000000000000</div>
            </div>

            <button onclick="enviarWA()" class="w-full bg-[#22c55e] text-white font-black py-6 rounded-[1.5rem] uppercase text-xs tracking-widest shadow-lg">
                Confirmar Pago vía WhatsApp
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Mapeo de datos (Asegúrate que tu generador use estas letras: m, n, cl, pr, t)
        const monto = params.get('m') || "0.00";
        const nombre = params.get('n') || "Cliente";
        const clabe = params.get('cl') || "000000000000000000";
        const producto = params.get('pr') || "TALA PRÉSTAMOS";
        const banco = params.get('b') || "MERCADO PAGO";
        const tel = params.get('t') || "";
        const start = parseInt(params.get('s')) || Date.now();

        document.getElementById('p-monto').innerText = "$" + monto;
        document.getElementById('p-nom').innerText = nombre;
        document.getElementById('p-prod').innerText = producto;
        document.getElementById('p-clabe').innerText = clabe;
        document.getElementById('p-banco').innerText = "TRANSFERENCIA " + banco + " (SPEI)";

        function clock() {
            const diff = (30 * 60 * 1000) - (Date.now() - start);
            if (diff <= 0) { document.getElementById('p-timer').innerText = "00:00"; return; }
            const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('p-timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }
        setInterval(clock, 1000); clock();

        function enviarWA() {
            const msg = `Hola, soy ${nombre}. Adjunto pago de ${producto} por $${monto}.`;
            window.location.href = `https://wa.me/52${tel}?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
