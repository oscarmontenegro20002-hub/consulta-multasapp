<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-card { width: 100%; max-width: 400px; background: white; border-radius: 40px; overflow: hidden; margin-top: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* ESTILO DEL RECUADRO ROSADO */
        .alerta-vencimiento {
            background-color: #fff1f1 !important;
            border: 2px solid #fee2e2 !important;
            border-radius: 20px !important;
            padding: 20px !important;
            margin: 20px 0 !important;
            display: block !important;
            clear: both !important;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div style="background-color: #14b8a6; color: white; padding: 40px 20px; text-align: center;">
            <p style="font-size: 10px; font-weight: 800; letter-spacing: 2px; margin: 0;">ORDEN DE PAGO</p>
            <h1 id="p-prod" style="font-size: 28px; font-weight: 900; margin: 5px 0; text-transform: uppercase;">TALA PRÉSTAMOS</h1>
        </div>

        <div style="padding: 25px;">
            <div style="background-color: #f9fafb; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid #f3f4f6;">
                <p style="font-size: 10px; font-weight: 800; color: #9ca3af; margin: 0;">MONTO TOTAL A PAGAR</p>
                <h2 id="p-monto" style="font-size: 45px; font-weight: 900; color: #0d9488; margin: 5px 0;">$0.00</h2>
            </div>

            <div style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0;">
                    <span style="font-size: 10px; font-weight: 800; color: #9ca3af;">CLIENTE</span>
                    <span id="p-nom" style="font-size: 13px; font-weight: 900; color: #1e293b; text-transform: uppercase;">---</span>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0;">
                    <span style="font-size: 10px; font-weight: 800; color: #9ca3af;">VENCIMIENTO</span>
                    <span id="p-fec" style="font-size: 13px; font-weight: 900; color: #1e293b;">---</span>
                </div>
            </div>

            <div class="alerta-vencimiento">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: #ef4444; font-size: 11px; font-weight: 900;">LA LIGA EXPIRA EN:</span>
                    <span id="p-timer" style="color: #ef4444; font-size: 26px; font-weight: 900;">29:50</span>
                </div>
                
                <p style="color: #ef4444; font-size: 12px; line-height: 1.5; margin-top: 15px; font-weight: 600; display: block !important;">
                    * Al llegar a 0, se cobrará una penalización de <b>$500,00 pesos ADICIONALES</b> por concepto de vencimiento de liga.
                </p>
            </div>

            <div style="background-color: #f0f9ff; border: 1px solid #e0f2fe; border-radius: 25px; padding: 20px; text-align: center;">
                <p id="p-banco" style="font-size: 10px; font-weight: 800; color: #3b82f6; margin: 0;">TRANSFERENCIA (SPEI)</p>
                <p id="p-clabe" style="font-size: 24px; font-weight: 900; color: #2563eb; letter-spacing: -1px; margin: 5px 0;">000000000000000000</p>
                <p style="font-size: 10px; color: #93c5fd; font-style: italic; font-weight: 700; margin: 0;">Referencia: Pago de Multa</p>
            </div>

            <button onclick="copiarLink()" style="width: 100%; background-color: #22c55e; color: white; padding: 20px; border-radius: 25px; font-weight: 900; font-size: 13px; border: none; margin-top: 20px; text-transform: uppercase; cursor: pointer;">
                Confirmar Pago vía WhatsApp
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const startTime = parseInt(params.get('s')) || Date.now();
        
        document.getElementById('p-monto').innerText = "$" + (params.get('m') || "0.00");
        document.getElementById('p-nom').innerText = (params.get('n') || "CLIENTE").toUpperCase();
        document.getElementById('p-fec').innerText = params.get('f') || "---";
        document.getElementById('p-prod').innerText = params.get('pr') || "TALA PRÉSTAMOS";
        document.getElementById('p-clabe').innerText = params.get('cl') || "";
        document.getElementById('p-banco').innerText = `TRANSFERENCIA ${params.get('b') || 'MERCADO PAGO'} (SPEI)`;

        function startTimer() {
            const now = Date.now();
            const distance = (30 * 60 * 1000) - (now - startTime);
            if (distance <= 0) {
                document.getElementById('p-timer').innerText = "00:00";
                return;
            }
            const mins = Math.floor(distance / 60000);
            const secs = Math.floor((distance % 60000) / 1000);
            document.getElementById('p-timer').innerText = (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
        }
        setInterval(startTimer, 1000);
        startTimer();

        function copiarLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Copiado al portapapeles");
        }
    </script>
</body>
</html>
