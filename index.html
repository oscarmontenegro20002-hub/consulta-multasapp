<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .app-card { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        /* Contenedor de lista de apps forzado */
        .lista-apps {
            max-height: 220px;
            overflow-y: auto;
            background: #f8fafc;
            margin: 10px 20px;
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        /* Botones de apps - IMPOSIBLES DE OCULTAR */
        .btn-app {
            width: 100%;
            margin-bottom: 8px;
            padding: 14px;
            border-radius: 12px;
            background-color: #1e293b !important; /* Azul oscuro */
            color: #ffffff !important; /* Texto blanco */
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            display: block;
            text-align: center;
        }

        .btn-app:active { background-color: #334155 !important; transform: scale(0.98); }
        .active-app { border: 3px solid #14b8a6 !important; background-color: #0f172a !important; }
    </style>
</head>
<body>
    <div class="app-card">
        <div id="header-bg" class="bg-[#1e293b] pt-8 pb-4 text-center text-white">
            <h1 id="titulo-app" class="text-lg font-black uppercase tracking-tighter">Selecciona la App</h1>
            <p class="text-[10px] opacity-70">DESLIZA Y TOCA UN NOMBRE</p>
        </div>

        <div class="lista-apps">
            <button onclick="seleccionar('TALA PRÉSTAMOS', '#14b8a6', this)" class="btn-app">Tala Préstamos</button>
            <button onclick="seleccionar('PRÉSTAMOS NU', '#820ad1', this)" class="btn-app">Préstamos NU</button>
            <button onclick="seleccionar('DIDAPRÉSTAMOS', '#2563eb', this)" class="btn-app">DidaPréstamos</button>
            <button onclick="seleccionar('PRÉSTAMOS RÁPIDOS', '#10b981', this)" class="btn-app">Préstamos Rápidos</button>
            <button onclick="seleccionar('WORLDMOXPRO GG', '#6366f1', this)" class="btn-app">WorldmoxPro GG</button>
            <button onclick="seleccionar('TALA CRÉDITO', '#0891b2', this)" class="btn-app">Tala Crédito</button>
            <button onclick="seleccionar('MOVIL CASH', '#f59e0b', this)" class="btn-app">Movil Cash</button>
            <button onclick="seleccionar('PRÉSTAMOS DE DINERO', '#db2777', this)" class="btn-app">Préstamos de Dinero</button>
            <button onclick="seleccionar('PRÉSTAMOS', '#475569', this)" class="btn-app">Préstamos</button>
        </div>

        <div class="p-6 space-y-4">
            <div class="bg-slate-50 p-4 rounded-2xl border">
                <p class="text-[10px] font-bold text-slate-400 uppercase text-center">Monto</p>
                <input type="number" id="monto" value="0.00" class="w-full bg-transparent text-3xl font-black text-center outline-none">
            </div>

            <input type="text" id="nombre" placeholder="NOMBRE DEL CLIENTE" class="w-full border-b-2 py-2 text-center font-bold uppercase outline-none">
            
            <button onclick="generarLink()" id="btn-gen" class="w-full bg-[#1e293b] text-white py-5 rounded-2xl font-black uppercase tracking-widest">
                Generar Orden de Pago
            </button>
        </div>
    </div>

    <script>
        let appGlobal = "TALA PRÉSTAMOS";
        let colorGlobal = "#1e293b";

        function seleccionar(nombre, color, btn) {
            appGlobal = nombre;
            colorGlobal = color;
            document.getElementById('header-bg').style.backgroundColor = color;
            document.getElementById('titulo-app').innerText = nombre;
            document.getElementById('btn-gen').style.backgroundColor = color;
            
            // Quitar clase activa de otros
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('active-app'));
            btn.classList.add('active-app');
        }

        function generarLink() {
            const data = new URLSearchParams({
                m: document.getElementById('monto').value,
                n: document.getElementById('nombre').value || "CLIENTE",
                pr: appGlobal,
                f: new Date().toISOString().split('T')[0],
                cl: "703010052250010635",
                b: "MERCADO PAGO",
                s: Date.now()
            });
            window.location.href = `detalle.html?${data.toString()}`;
        }
    </script>
</body>
</html>
