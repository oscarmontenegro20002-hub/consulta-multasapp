<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #0b1120; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        #login-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://img.freepik.com/foto-gratis/fondo-luces-bokeh-dorado-abstracto_23-2148413465.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .login-card { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 3rem 2.5rem; 
            border-radius: 3rem; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #main-app { display: none; }
        .card-container { 
            width: 100%; 
            max-width: 440px; 
            background: white; 
            border-radius: 2.5rem; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            position: relative; 
            z-index: 10; 
        }
        .monto-box { border-radius: 1.5rem; padding: 1rem 1.5rem; margin: 1rem 1.5rem 0 1.5rem; position: relative; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.2rem; line-height: 1; }
        .error-msg { color: #ef4444; font-size: 12px; font-weight: 600; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="login-bg"></div>

    <div id="login-screen" class="px-4 w-full flex justify-center">
        <div class="login-card">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Bienvenido</h2>
            <p class="text-slate-500 font-medium mb-10">Ingresa tus credenciales para acceder</p>
            
            <div class="space-y-5">
                <input type="text" id="user" placeholder="Usuario" class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/50 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/50 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium">
                
                <div id="login-error" class="error-msg text-center">Usuario o contraseña incorrectos</div>
                
                <button onclick="acceder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-600/20 active:scale-95 transition-all mt-4 uppercase tracking-widest text-sm">
                    Entrar al Sistema
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="card-container">
        <div id="header-bg" class="bg-[#14b8a6] pt-8 pb-4">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-6 mb-2">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 text-sm font-bold text-center outline-none backdrop-blur-md">
                    <option value="tala|#14b8a6|#0d9488" class="text-black">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87" class="text-black">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8" class="text-black">DidaPréstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1" class="text-black">Worldmoxpro Cash GG</option>
                    <option value="movil|#8b5cf6|#6d28d9" class="text-black">Movil Cash</option>
                </select>
            </div>
            <div id="monto-card-bg" class="monto-box bg-[#0d9488] text-white shadow-lg">
                <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-3xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="sync()" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Subproducto</span>
                <span class="text-sm font-bold text-slate-800">Multa</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Importe</span>
                <span id="res-monto" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Fecha Vencimiento</span>
                <input type="date" id="f-venc" onchange="dias()" class="text-sm font-bold text-slate-800 outline-none">
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Días Vencimiento</span>
                <span id="res-dias" class="text-sm font-bold text-slate-800">0</span>
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-5 space-y-4 border border-slate-100">
                <div class="text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Método de pago</span>
                    <select id="metodo-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                        <option value="STP">STP</option>
                        <option value="BBVA">BBVA</option>
                    </select>
                </div>
                <div class="text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Liga de pago</span>
                    <select id="clabe-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center text-blue-600 outline-none">
                        <option value="703010052250010635">703010052250010635</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <div class="border-b border-slate-200 flex justify-between items-end pb-1">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Nombre del cliente</label>
                    <input type="text" id="cliente-nombre" placeholder="Nombre" class="text-right text-sm font-bold outline-none w-2/3">
                </div>
                <div class="border-b border-slate-200 flex justify-between items-end pb-1">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Teléfono</label>
                    <input type="text" id="cliente-tel" placeholder="Teléfono" class="text-right text-sm font-bold outline-none w-2/3">
                </div>
            </div>

            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#0d9488] text-white font-bold py-5 rounded-[1.5rem] shadow-xl uppercase text-xs tracking-widest mt-2 transition-all active:scale-95">GENERAR LINK</button>
        </div>
    </div>

    <script>
        function acceder() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('login-bg').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                dias();
            } else {
                document.getElementById('login-error').style.display = 'block';
                setTimeout(() => { document.getElementById('login-error').style.display = 'none'; }, 2000);
            }
        }

        const logos = {'tala': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png','nu': 'https://i.ibb.co/Lzf7vYn/image-45ecfc.png','dida': 'https://i.ibb.co/BccC9Rz/image-46429b.png','worldmox': 'https://i.ibb.co/VvzM47m/image-45e8a1.png','movil': 'https://i.ibb.co/vY8N9zX/image-45e4a2.png'};
        
        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
            document.getElementById('app-logo').src = logos[id] || logos['tala'];
        }

        function sync() {
            let v = document.getElementById('input-monto').value || "0";
            document.getElementById('res-monto').innerText = "$" + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function dias() {
            let f = document.getElementById('f-venc').value;
            if(!f) return;
            let hoy = new Date(); hoy.setHours(0,0,0,0);
            let venc = new Date(f + 'T00:00:00');
            let diffDays = Math.ceil((venc.getTime() - hoy.getTime()) / (1000 * 60 * 60 * 24));
            const d = document.getElementById('res-dias');
            d.innerText = diffDays;
            d.style.color = diffDays < 0 ? "#ef4444" : "#1e293b";
        }

        function confirmar() {
            const monto = document.getElementById('input-monto').value || "0.00";
            const nombre = document.getElementById('cliente-nombre').value || "Cliente";
            const tel = document.getElementById('cliente-tel').value || "";
            const fecha = document.getElementById('f-venc').value || "";
            const sel = document.getElementById('product-select');
            const producto = sel.options[sel.selectedIndex].text;
            
            // Envío de datos al link de pago
            const params = new URLSearchParams({
                monto: monto,
                nombre: nombre,
                tel: tel,
                fecha: fecha,
                prod: producto
            });

            window.location.href = `detalle.html?${params.toString()}`;
        }

        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
