<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orden de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card-final { width: 100%; max-width: 420px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="card-final">
        <div class="bg-[#14b8a6] text-white pt-10 pb-8 text-center">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">Orden de Pago</span>
            <h1 id="p-prod" class="text-3xl font-black mt-1 uppercase text-white">TALA PRÉSTAMOS</h1>
        </div>

        <div class="p-8 space-y-6">
            <div class="bg-slate-50 rounded-[2rem] p-8 text-center border border-slate-100">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Monto Total a Pagar</span>
                <div class="text-5xl font-black text-[#0d9488]" id="p-monto">$0.00</div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                    <span class="text-[11px] font-bold text-slate-400 uppercase">Cliente</span>
                    <span id="p-nom" class="text-sm font-black text-slate-800 uppercase">Cargando...</span>
                </div>

                <div style="background-color: #fff1f1; border: 2px solid #fee2e2; border-radius: 1.5rem; padding: 20px; margin: 20px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase;">La liga expira en:</span>
                        <span id="p-timer" style="font-size: 24px; font-weight: 900; color: #ef4444;">30:00</span>
                    </div>
                    <p style="color: #ef4444; font-size: 12px; line-height: 1.5; margin-top: 15px; font-weight: 700; display: block !important; visibility: visible !important;">
                        * Al llegar a 0, se cobrará una penalización de <span style="text-decoration: underline;">$500.00 pesos adicionales</span> por concepto de vencimiento de liga de pago.
                    </p>
                </div>
            </div>

            <div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center">
                <span id="p-banco" class="text-[10px] font-bold text-blue-500 uppercase block mb-2">TRANSFERENCIA (SPEI)</span>
                <div id="p-clabe" class="text-2xl font-black text-blue-700 tracking-tighter">000000000000000000</div>
                <p class="text-[10px] italic text-blue-400 font-bold mt-2">Referencia: Pago de Multa</p>
            </div>

            <button onclick="enviarWA()" class="w-full bg-[#22c55e] text-white font-black py-6 rounded-[1.5rem] uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-transform">
                Confirmar Pago vía WhatsApp
            </button>
        </div>
    </div>

    <script>
        // Función ultra-segura para capturar datos
        try {
            const params = new URLSearchParams(window.location.search);
            
            // Mapeo compatible con TODOS tus generadores previos
            const monto = params.get('m') || params.get('monto') || "0.00";
            const nombre = params.get('n') || params.get('nombre') || "Cliente";
            const clabe = params.get('cl') || params.get('clabe') || "000000000000000000";
            const producto = params.get('pr') || params.get('prod') || "TALA PRÉSTAMOS";
            const banco = params.get('b') || params.get('banco') || "MERCADO PAGO";
            const tel = params.get('t') || params.get('tel') || "";
            const start = parseInt(params.get('s')) || Date.now();

            document.getElementById('p-monto').innerText = "$" + monto;
            document.getElementById('p-nom').innerText = nombre.toUpperCase();
            document.getElementById('p-prod').innerText = producto.toUpperCase();
            document.getElementById('p-clabe').innerText = clabe.replace(/\s+/g, '');
            document.getElementById('p-banco').innerText = "TRANSFERENCIA " + banco.toUpperCase() + " (SPEI)";

            function clock() {
                const diff = (30 * 60 * 1000) - (Date.now() - start);
                if (diff <= 0) { 
                    document.getElementById('p-timer').innerText = "EXPIRADO"; 
                    return; 
                }
                const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
                document.getElementById('p-timer').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            }
            setInterval(clock, 1000); 
            clock();

            window.enviarWA = function() {
                const msg = `Hola, soy ${nombre}. Adjunto pago de ${producto} por $${monto}.`;
                window.location.href = `https://wa.me/52${tel}?text=${encodeURIComponent(msg)}`;
            };
        } catch (e) {
            console.error("Error en script, pero el HTML debería verse igual.");
        }
    </script>
</body>
</html>
