<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; }
        .timer-txt { color: #ef4444; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="card shadow-2xl">
        <div id="h-col" class="bg-[#14b8a6] text-white pt-10 pb-8 text-center">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">Orden de Pago</span>
            <h1 id="d-prod" class="text-3xl font-black mt-2 uppercase">PRODUCTO</h1>
        </div>

        <div class="p-8 space-y-6">
            <div class="bg-gray-50 rounded-[2rem] p-8 text-center border border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase block mb-2">Monto Total a Pagar</span>
                <div class="text-4xl font-black text-[#0d9488]" id="d-monto">$0.00</div>
            </div>

            <div class="space-y-4 text-sm font-bold">
                <div class="flex justify-between border-b pb-3"><span class="text-gray-400 uppercase text-[10px]">Nombre del Cliente</span><span id="d-nom" class="uppercase">---</span></div>
                <div class="flex justify-between border-b pb-3"><span class="text-gray-400 uppercase text-[10px]">Fecha de Vencimiento</span><span id="d-fec">---</span></div>
                
                <div class="bg-red-50 rounded-2xl p-4 border border-red-100">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-red-600 uppercase">La liga expira en:</span>
                        <span id="timer" class="timer-txt text-lg">30:00</span>
                    </div>
                    <p class="text-[9px] text-red-500 mt-2 font-semibold leading-tight">
                        * Al llegar a 0, se cobrarán <span class="font-bold">$500.00 pesos adicionales</span> por concepto de vencimiento de liga de pago.
                    </p>
                </div>
            </div>

            <div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center space-y-2">
                <span id="d-ban" class="text-[10px] font-bold text-blue-500 uppercase">TRANSFERENCIA</span>
                <div id="d-cla" class="text-xl font-black text-blue-700 tracking-tighter">000000000000000000</div>
                <p class="text-[10px] italic text-blue-400">Referencia: Pago de Multa</p>
            </div>

            <button onclick="navigator.clipboard.writeText(window.location.href); alert('Copiado');" class="w-full bg-[#1e293b] text-white font-bold py-5 rounded-[1.5rem] uppercase text-[11px] tracking-widest shadow-lg flex items-center justify-center gap-2">
                COPIAR LINK DE PAGO
            </button>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const start = parseInt(p.get('s')) || Date.now();
        document.getElementById('d-monto').innerText = "$" + parseFloat(p.get('m') || 0).toFixed(2);
        document.getElementById('d-nom').innerText = p.get('n');
        document.getElementById('d-fec').innerText = p.get('f');
        document.getElementById('d-prod').innerText = p.get('pr');
        document.getElementById('d-cla').innerText = p.get('cl');
        document.getElementById('d-ban').innerText = `TRANSFERENCIA ${p.get('b')} (SPEI)`;

        function tick() {
            const rem = (30 * 60 * 1000) - (Date.now() - start);
            if(rem <= 0) { document.getElementById('timer').innerText = "00:00"; return; }
            const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }
        setInterval(tick, 1000); tick();
    </script>
</body>
</html>
