<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pagos Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        select { appearance: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] bg-white rounded-[3rem] card-shadow overflow-hidden">
        
        <div id="header-bg" class="bg-[#7dd3fc] p-8 pb-16 text-center relative transition-all duration-500">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden p-1">
                <img id="app-logo" src="" class="w-full h-full object-contain">
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 uppercase shadow-sm">
                Inhabilitar foto
            </button>

            <div class="relative w-full max-w-[280px] mx-auto z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-blue-600 text-center shadow-sm outline-none">
                    <option value="default|#7dd3fc|#1d4ed8">Seleccionar Producto</option>
                    <option value="nu|#820ad1|#5d0796">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1e40af">DiDa Préstamos</option>
                    <option value="tala|#0056b3|#003d7a">Tala Préstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                    <option value="rapidos|#f43f5e|#be123c">Préstamos Rápidos</option>
                    <option value="movil|#8b5cf6|#5b21b6">Movil Cash</option>
                </select>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#1d4ed8] rounded-2xl p-6 text-left shadow-xl z-20">
                <p class="text-white/70 text-[10px] uppercase font-bold mb-1">Monto de Pago</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500 font-medium">Subproducto</span>
                <select id="subproducto" class="text-sm font-bold text-slate-800 bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Intereses</option>
                    <option>Bloqueo de WhatsApp</option>
                    <option>Paz y Salvo</option>
                    <option>Liquidación Total</option>
                    <option>Abono</option>
                    <option>Préstamo</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500 font-medium">Importe a Pagar</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="flex justify-between items-center border-b pb-2">
                <span class="text-sm text-slate-500 font-medium">Fecha Vencimiento</span>
                <input type="date" class="text-sm font-bold text-slate-400 outline-none bg-transparent">
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-6 text-center border border-slate-100 mt-4">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Liga de pago</p>
                <p id="display-link" class="text-xs font-mono text-slate-800 truncate">Esperando generación...</p>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-50 space-y-2">
                <input type="text" placeholder="Nombre" class="w-full text-sm border-b pb-1 outline-none">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b pb-1 outline-none">
            </div>

            <button onclick="generateLink()" id="btn-generar" class="w-full bg-[#1d4ed8] text-white font-extrabold py-5 rounded-2xl shadow-lg active:scale-95 uppercase text-xs tracking-widest transition-all">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        // LOGOS OFICIALES EN TEXTO (BASE64) - NO DEPENDEN DE INTERNET
        const logos = {
            'nu': 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAMAAAD0407yAAAASFBMVEVHcEzaOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3aOk3v8G9vAAAAGHRSTlMA70DfP2C/YI9A30DfT6O3OQ9A379gv2CPQN+eH5kAAAGKSURBVHja7ZpZDsMgDEXTmSSTmST7360TS6itRAnvV6re8ySIAYMAAAAAAAAAAAAAAAAAAAAAAAAAmEn086Z/9KOf9P/0uX6e6f/p95Z+7fRPXm76W7IffS0p9Nfk0F+SQ39N9v17cv/3pE9pX5fT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9PrT+vA1W/m8XNbf62X8689t7/Nq/XmvS97XvT5p9C97XfL+9Prf/4B+2uVzU80X8iAAAAAAAAAAAAAAAAAAAAAAAAAADI7QMfOwX9/wI3igAAAABJRU5ErkJggg==',
            'dida': 'https://i.ibb.co/Lzf7vYn/image-46429b.png', // Fallback, pero el de Nu ya es interno
            'tala': 'https://i.ibb.co/vY8N9zX/image-45ec84.png',
            'worldmox': 'https://i.ibb.co/BccC9Rz/image-45e8a1.png'
        };

        let fotoVisible = true;

        function updateApp() {
            const select = document.getElementById('select-app');
            const [id, color1, color2] = select.value.split('|');
            
            document.getElementById('header-bg').style.backgroundColor = color1;
            document.getElementById('monto-banner').style.backgroundColor = color2;
            document.getElementById('btn-generar').style.backgroundColor = color2;

            const img = document.getElementById('app-logo');
            if (id !== 'default' && fotoVisible) {
                img.src = logos[id] || '';
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }

        function toggleFoto() {
            fotoVisible = !fotoVisible;
            document.getElementById('btn-foto').innerText = fotoVisible ? "Inhabilitar foto" : "Habilitar foto";
            updateApp();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString();
        }

        function generateLink() {
            const link = "https://pago.mx/ref-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('display-link').innerText = link;
            alert("Enlace generado con éxito");
        }
    </script>
</body>
</html>
