<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cobro Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(255, 255, 255, 1); border-radius: 48px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); }
        .input-style { width: 100%; border-bottom: 2px solid #f1f5f9; padding: 8px 0; outline: none; transition: all 0.3s; font-size: 14px; }
        .input-style:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-[400px] overflow-hidden">
        
        <div id="header-bg" class="bg-[#0d9488] p-10 pb-16 text-center relative transition-all duration-500">
            
            <div class="w-24 h-24 bg-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-2xl p-4 overflow-hidden">
                <div id="logo-svg-container" class="w-full h-full flex items-center justify-center">
                    </div>
            </div>

            <div class="relative group">
                <select id="select-app" onchange="actualizarTodo()" class="w-full bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl px-4 py-3 text-white font-bold text-sm cursor-pointer outline-none appearance-none text-center hover:bg-white/30 transition-all">
                    <option value="tala|#0d9488|#134e4a" class="text-slate-800">Tala Préstamos</option>
                    <option value="nu|#820ad1|#4c0577" class="text-slate-800">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1e3a8a" class="text-slate-800">DiDa Préstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1" class="text-slate-800">WorldmoxPro Cash GG</option>
                    <option value="movil|#8b5cf6|#5b21b6" class="text-slate-800">Movil Cash</option>
                </select>
            </div>

            <div id="monto-banner" class="absolute -bottom-10 left-8 right-8 bg-[#134e4a] rounded-[2rem] p-6 text-left shadow-2xl transition-all duration-500">
                <p class="text-white/60 text-[10px] uppercase font-extrabold tracking-tighter mb-1">Monto a Liquidar</p>
                <div class="flex items-center text-white">
                    <span class="text-4xl font-black mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncDisplay()" placeholder="0.00" class="bg-transparent text-4xl font-black outline-none w-full placeholder:text-white/10">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="px-10 pb-10 space-y-6">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-slate-400 uppercase">Subproducto</span>
                <select class="text-sm font-bold text-slate-700 bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Liquidación</option>
                    <option>Paz y Salvo</option>
                </select>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-slate-400 uppercase">Importe Total</span>
                <span id="display-importe" class="text-lg font-black text-slate-800">$0.00</span>
            </div>

            <div class="bg-slate-50 rounded-3xl p-5 border border-slate-100 text-center">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-2">Enlace de Pago Generado</p>
                <p id="display-link" class="text-[11px] font-mono font-bold text-blue-600 break-all bg-white p-2 rounded-lg border border-slate-200">Esperando datos...</p>
            </div>

            <div class="space-y-4">
                <input type="text" placeholder="Nombre completo del cliente" class="input-style">
                <input type="text" placeholder="Número de teléfono" class="input-style">
            </div>

            <button onclick="generar()" id="btn-main" class="w-full bg-[#134e4a] text-white font-black py-5 rounded-[1.5rem] shadow-xl active:scale-95 transition-all uppercase text-xs tracking-widest mt-4">
                Generar y Copiar Liga
            </button>
        </div>
    </div>

    <script>
        // LOGOS EN FORMATO SVG (DIBUJADOS POR CÓDIGO)
        const logos = {
            'tala': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#0d9488"/><text x="50" y="55" font-family="Arial" font-size="22" font-weight="900" text-anchor="middle" fill="white">TALA</text><text x="50" y="75" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="white">TE PRESTA</text></svg>`,
            'nu': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#820ad1"/><text x="50" y="65" font-family="Arial" font-size="45" font-weight="900" text-anchor="middle" fill="white">nu</text></svg>`,
            'dida': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#2563eb"/><text x="50" y="62" font-family="Arial" font-size="30" font-weight="900" text-anchor="middle" fill="white">DIDA</text></svg>`,
            'worldmox': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#0ea5e9"/><path d="M30 40 L50 70 L70 40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/><text x="50" y="30" font-family="Arial" font-size="12" font-weight="900" text-anchor="middle" fill="white">WORLDMOX</text></svg>`,
            'movil': `<svg viewBox="0 0 100 100" class="w-full h-full"><rect width="100" height="100" rx="20" fill="#8b5cf6"/><text x="50" y="62" font-family="Arial" font-size="40" font-weight="900" text-anchor="middle" fill="white">M</text></svg>`
        };

        function actualizarTodo() {
            const select = document.getElementById('select-app');
            const [id, color1, color2] = select.value.split('|');
            
            document.getElementById('header-bg').style.backgroundColor = color1;
            document.getElementById('monto-banner').style.backgroundColor = color2;
            document.getElementById('btn-main').style.backgroundColor = color2;
            document.getElementById('logo-svg-container').innerHTML = logos[id];
        }

        function syncDisplay() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function generar() {
            const idRandom = Math.random().toString(36).substring(7).toUpperCase();
            const liga = `https://pago.mx/secure/REF-${idRandom}`;
            document.getElementById('display-link').innerText = liga;
            
            // Copiar al portapapeles
            navigator.clipboard.writeText(liga);
            alert("✅ Liga generada y copiada al portapapeles.");
        }

        // Iniciar la app con Tala
        actualizarTodo();
    </script>
</body>
</html>
