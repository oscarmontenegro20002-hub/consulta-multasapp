<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pro - Todo en Uno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[420px] bg-white rounded-[3rem] card-shadow overflow-hidden text-slate-800">
        
        <div id="header-bg" class="bg-[#7dd3fc] p-8 pb-16 text-center relative transition-all">
            <div id="logo-container" class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden p-2">
                <img id="app-logo" src="" class="hidden w-full h-full object-contain">
                <div id="logo-placeholder" class="text-slate-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 uppercase tracking-wider transition-all">
                Inhabilitar foto
            </button>

            <div class="relative w-full max-w-[280px] mx-auto z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-blue-600 text-center shadow-sm focus:outline-none cursor-pointer">
                    <option value="default|#7dd3fc|#1d4ed8">-- Seleccionar Producto --</option>
                    <option value="dida|#2563eb|#1e40af">DiDa Prestamos</option>
                    <option value="nu|#820ad1|#5d0796">Prestamos Nu</option>
                    <option value="tala|#0056b3|#003d7a">Tala Prestamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                    <option value="movil|#8b5cf6|#5b21b6">Movil Cash</option>
                    <option value="rapidos|#f43f5e|#be123c">Prestamos Rapidos</option>
                    <option value="talacredito|#10b981|#047857">Tala Crédito</option>
                    <option value="finanza|#f59e0b|#b45309">Finanza Dinero</option>
                    <option value="peso|#06b6d4|#0891b2">Peso Directo</option>
                    <option value="prestamos|#475569|#1e293b">Prestamos General</option>
                </select>
            </div>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-[#1d4ed8] rounded-2xl p-6 text-left shadow-xl z-20 transition-all">
                <p class="text-white/70 text-[10px] uppercase font-bold tracking-widest mb-1">Monto de Préstamo</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full placeholder:text-white/20" value="0.00">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Subproducto</span>
                <select class="text-sm font-bold text-slate-800 outline-none bg-transparent text-right">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Intereses</option>
                    <option>Bloqueo de WhatsApp</option>
                    <option>Paz y Salvo</option>
                    <option>Liquidación Total</option>
                    <option>Abono</option>
                </select>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Importe a Pagar</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-sm text-slate-500 font-medium">Vencimiento</span>
                <input type="date" id="input-fecha" class="text-sm font-bold text-slate-400 outline-none bg-transparent text-right">
            </div>

            <div class="bg-slate-50 rounded-[2.5rem] p-6 text-center border border-slate-100 mt-4">
                <select class="text-[10px] text-slate-400 uppercase font-bold tracking-widest outline-none bg-transparent mb-1">
                    <option>STP</option>
                    <option>BBVA</option>
                    <option>Bancolombia</option>
                    <option>Nequi</option>
                    <option>OXXO</option>
                </select>
                <h3 class="text-2xl font-black text-slate-800 mb-1">Liga de pago</h3>
                <p id="display-link" class="text-[10px] text-slate-400 font-mono truncate px-4">Esperando...</p>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-100 space-y-2">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm outline-none border-b border-slate-50 pb-1">
                <input type="text" placeholder="Teléfono" class="w-full text-sm outline-none border-b border-slate-50 pb-1">
            </div>

            <button onclick="generateLink()" id="btn-generar" class="w-full bg-[#1d4ed8] text-white font-extrabold py-5 rounded-2xl shadow-lg transition-all active:scale-95 mt-4 uppercase text-xs tracking-widest">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        // URLs alternativas más estables
        const logos = {
            'dida': 'https://logo.clearbit.com/dida.com',
            'nu': 'https://logo.clearbit.com/nu.com.mx',
            'tala': 'https://logo.clearbit.com/tala.co',
            'worldmox': 'https://logo.clearbit.com/worldmox.com',
            'movil': 'https://logo.clearbit.com/movil.com',
            'rapidos': 'https://logo.clearbit.com/prestamos.mx',
            'talacredito': 'https://logo.clearbit.com/talacredito.com'
        };

        let fotoHabilitada = true;

        function updateApp() {
            const select = document.getElementById('select-app');
            const [id, colorLight, colorDark] = select.value.split('|');
            
            // Cambiar colores
            document.getElementById('header-bg').style.backgroundColor = colorLight;
            document.getElementById('monto-banner').style.backgroundColor = colorDark;
            document.getElementById('btn-generar').style.backgroundColor = colorDark;

            const logoImg = document.getElementById('app-logo');
            const placeholder = document.getElementById('logo-placeholder');

            // Lógica de imagen
            if (id === "default" || !fotoHabilitada) {
                logoImg.classList.add('hidden');
                placeholder.classList.remove('hidden');
            } else {
                logoImg.src = logos[id] || '';
                logoImg.onload = () => {
                    logoImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                logoImg.onerror = () => {
                    logoImg.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                };
            }
        }

        function toggleFoto() {
            fotoHabilitada = !fotoHabilitada;
            const btn = document.getElementById('btn-foto');
            btn.innerText = fotoHabilitada ? "Inhabilitar foto" : "Habilitar foto";
            btn.classList.toggle('bg-red-500', !fotoHabilitada);
            btn.classList.toggle('text-white', !fotoHabilitada);
            updateApp();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + val;
        }

        function generateLink() {
            const random = Math.random().toString(36).substring(7).toUpperCase();
            const link = `https://pago.mx/ref-${random}`;
            document.getElementById('display-link').innerText = link;
            navigator.clipboard.writeText(link);
            alert("¡Link copiado al portapapeles!");
        }

        // Inicializar
        updateApp();
    </script>
</body>
</html>
