<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; display: flex; align-items: center; justify-content: center; min-height: screen; margin: 0; padding: 20px; }
        .card-container { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2.5rem; }
        
        /* Estilo para ocultar el generador antes del login */
        #main-app { display: none; }
        
        /* Estilo del Login para que combine con tu diseño oscuro */
        #login-box { width: 100%; max-width: 400px; background: white; padding: 40px; border-radius: 2.5rem; text-align: center; }
    </style>
</head>
<body>

    <div id="login-box">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Panel de Acceso</h2>
        <input type="text" id="user" placeholder="Usuario" class="w-full mb-4 px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 font-medium bg-slate-50">
        <input type="password" id="pass" placeholder="Contraseña" class="w-full mb-6 px-5 py-3 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 font-medium bg-slate-50">
        <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 shadow-lg">INGRESAR</button>
        <p id="error" class="text-red-500 text-xs mt-4 hidden font-bold">Credenciales incorrectas</p>
    </div>

    <div id="main-app" class="card-container">
        <div id="header-bg" class="bg-[#0d9488] p-10 pb-16 text-center relative">
            <div class="w-24 h-24 bg-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-xl overflow-hidden">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            
            <div id="monto-card-bg" class="absolute -bottom-10 left-6 right-6 bg-[#065f46] rounded-[1.5rem] p-6 text-left text-white shadow-2xl">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">MONTO DE PAGO</span>
                <div class="flex items-center mt-1">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-5">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Subproducto</span>
                <span class="text-sm font-bold text-slate-800">Multa</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Importe</span>
                <span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Fecha Vencimiento</span>
                <input type="date" id="fecha-venc" onchange="calcDays()" class="text-sm font-bold text-slate-800 outline-none cursor-pointer">
            </div>
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <span class="text-[11px] font-bold text-slate-400 uppercase">Días vencimiento</span>
                <span id="days-count" class="text-sm font-bold text-slate-800">0</span>
            </div>

            <div class="space-y-3 pt-2">
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase text-center mb-2">Método de pago</label>
                    <select id="metodo-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                        <option value="STP">STP</option>
                        <option value="BBVA">BBVA</option>
                    </select>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase text-center mb-2">Liga de pago</label>
                    <select id="liga-select" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-xs font-mono font-bold text-blue-600 text-center outline-none">
                        <option value="703010052250010635">703010052250010635</option>
                        <option value="1235132812492191">1235132812492191</option>
                    </select>
                </div>
            </div>

            <button onclick="confirmar()" class="w-full bg-[#065f46] text-white font-bold py-5 rounded-[1.5rem] shadow-xl uppercase text-xs tracking-widest mt-4 hover:brightness-110 active:scale-95 transition-all">
                Generar Link
            </button>
        </div>
    </div>

    <script>
        // LOGIN
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "123") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        // LÓGICA GENERADOR
        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function calcDays() {
            const fValue = document.getElementById('fecha-venc').value;
            if(!fValue) return;
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const venc = new Date(fValue + 'T00:00:00');
            const diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
            const el = document.getElementById('days-count');
            el.innerText = diff;
            el.style.color = diff < 0 ? "#ef4444" : "#1e293b";
        }

        function confirmar() { alert("✅ Liga generada exitosamente"); }

        document.getElementById('fecha-venc').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
