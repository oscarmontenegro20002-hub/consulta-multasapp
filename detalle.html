<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl">
        <div class="bg-[#14b8a6] p-8 text-center text-white">
            <h2 id="p-prod" class="text-xl font-bold uppercase">PRODUCTO</h2>
        </div>
        <div class="p-8 space-y-4">
            <div class="bg-slate-50 p-6 rounded-2xl space-y-3">
                <p class="text-xs font-bold text-slate-400 uppercase">Cliente: <span id="p-nom" class="text-slate-800 ml-2"></span></p>
                <p class="text-xs font-bold text-slate-400 uppercase">Monto: <span id="p-mon" class="text-[#14b8a6] text-lg ml-2"></span></p>
                <p class="text-xs font-bold text-slate-400 uppercase">Fecha: <span id="p-fec" class="text-slate-800 ml-2"></span></p>
                <div class="border-t pt-2 mt-2">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">CLABE BBVA</p>
                    <p class="text-blue-700 font-mono font-bold">703010052250010635</p>
                </div>
            </div>
            <button onclick="enviarWA()" class="w-full bg-[#25D366] text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2">
                ENVIAR POR WHATSAPP
            </button>
            <button onclick="window.history.back()" class="w-full text-slate-400 text-xs font-bold uppercase tracking-widest">
                Volver al generador
            </button>
        </div>
    </div>
    <script>
        // Leer los datos de la URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('p-nom').innerText = params.get('nombre') || '---';
        document.getElementById('p-mon').innerText = '$' + (params.get('monto') || '0.00');
        document.getElementById('p-fec').innerText = params.get('fecha') || '---';
        document.getElementById('p-prod').innerText = params.get('prod') || 'PAGO';

        function enviarWA() {
            const texto = `*RESUMEN DE PAGO*\n\n👤 *Cliente:* ${params.get('nombre')}\n💰 *Monto:* $${params.get('monto')}\n📅 *Vence:* ${params.get('fecha')}\n💳 *CLABE BBVA:* 703010052250010635`;
            window.open(`https://wa.me/${params.get('tel')}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
