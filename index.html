<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background-color: #0b1120;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
        }

        /* FONDO DINÁMICO REESTABLECIDO */
        #video-viewport {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background-color: #0b1120;
        }
        #bg-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
        }

        /* LOGIN ORIGINAL (image_432f05.png) */
        #login-screen { position: relative; z-index: 10; width: 100%; display: flex; justify-content: center; }
        .login-card { 
            width: 90%; max-width: 400px; background: white; 
            padding: 2.5rem; border-radius: 2.5rem; text-align: center; 
        }

        /* GENERADOR ORIGINAL (image_439725.png) */
        #main-app { 
            display: none; width: 100%; max-width: 440px; 
            background: white; border-radius: 2.5rem; overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            position: relative; z-index: 10;
        }
        
        .monto-box { border-radius: 1.5rem; padding: 1.5rem; margin: 1rem 1.5rem 0 1.5rem; }
        .input-monto { 
            background: transparent; border: none; outline: none; 
            width: 100%; color: white; font-weight: 700; 
            font-size: 2.5rem; line-height: 1; 
        }
    </style>
</head>
<body>

    <div id="video-viewport">
        <video id="bg-video" autoplay loop muted playsinline preload="auto">
            <source src="https://cdn.pixabay.com/video/2022/04/10/113368-697525287_tiny.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-1">Bienvenido</h2>
            <p class="text-slate-400 text-xs mb-8">Acceso Privado Panel Administrativo Pro</p>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Usuario" class="w-full px-5 py-4 rounded-xl border border-slate-100 bg-slate-50 outline-none">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full px-5 py-4 rounded-xl border border-slate-100 bg-slate-50 outline-none">
                <div id="login-error" class="hidden text-red-500 text-xs font-bold">Usuario o contraseña incorrectos</div>
                <button onclick="acceder()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest mt-2">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div id="header-bg" class="bg-[#14b8a6] pt-8 pb-4">
            <div class="w-16 h-16 bg-white rounded-2xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-2 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-6 mb-2">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 text-sm font-bold text-center outline-none">
                    <option value="tala|#14b8a6|#0d9488" class="text-black">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87" class="text-black">Préstamos NU</option>
                </select>
            </div>
            <div id="monto-card-bg" class="monto-box bg-[#0d9488] text-white">
                <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-2xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="sync()" placeholder="0" class="input-monto">
                </div>
            </div>
        </div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-50 pb-2 text-slate-400 font-bold text-[11px] uppercase">
                <span>Subproducto</span><span class="text-slate-800 text-sm">Multa</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-50 pb-2 text-slate-400 font-bold text-[11px] uppercase">
                <span>Importe</span><span id="res-monto" class="text-slate-800 text-sm">$0.00</span>
            </div>
            <div class="flex justify-between items-center border-b border-slate-50 pb-2 text-slate-400 font-bold text-[11px] uppercase">
                <span>Vencimiento</span><input type="date" id="f-venc" onchange="dias()" class="text-slate-800 text-sm outline-none">
            </div>
            <div class="flex justify-between items-center border-b border-slate-50 pb-2 text-slate-400 font-bold text-[11px] uppercase">
                <span>Días</span><span id="res-dias" class="text-slate-800 text-sm">0</span>
            </div>

            <div class="bg-slate-50 rounded-[2rem] p-5 space-y-4 border border-slate-100">
                <select class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                    <option>Metodo: BBVA</option>
                </select>
                <select class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center text-blue-600 outline-none">
                    <option>703010052250010635</option>
                </select>
            </div>

            <div class="space-y-4 pt-2">
                <div class="border-b border-slate-200 pb-1 flex justify-between items-center">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Nombre del cliente</label>
                    <input type="text" placeholder="Nombre" class="text-right text-sm font-bold outline-none w-1/2">
                </div>
                <div class="border-b border-slate-200 pb-1 flex justify-between items-center">
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Teléfono</label>
                    <input type="text" placeholder="Teléfono" class="text-right text-sm font-bold outline-none w-1/2">
                </div>
            </div>

            <button class="w-full bg-[#14b8a6] text-white font-bold py-5 rounded-2xl shadow-xl uppercase text-xs tracking-widest mt-2 active:scale-95 transition-all">Generar Link</button>
        </div>
    </div>

    <script>
        function acceder() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
        }

        function sync() {
            let v = document.getElementById('input-monto').value || "0";
            document.getElementById('res-monto').innerText = "$" + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function dias() {
            let f = document.getElementById('f-venc').value;
            if(!f) return;
            let hoy = new Date(); hoy.setHours(0,0,0,0);
            let venc = new Date(f + 'T00:00:00');
            let diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
            const d = document.getElementById('res-dias');
            d.innerText = diff;
            d.style.color = diff < 0 ? "#ef4444" : "#1e293b";
        }
    </script>
</body>
</html>
