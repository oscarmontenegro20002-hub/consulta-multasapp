<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Protegido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; }
        /* Fuerza a que el generador esté oculto al cargar */
        #main-generator { display: none; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-screen" class="w-full max-w-sm bg-white p-10 rounded-[2.5rem] shadow-2xl text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold mb-6">Acceso Privado</h2>
        <input type="text" id="user" placeholder="Usuario" class="w-full mb-4 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
        <input type="password" id="pass" placeholder="Contraseña" class="w-full mb-6 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">INGRESAR</button>
        <p id="error" class="text-red-500 text-xs mt-4 hidden font-bold italic">Usuario o clave incorrectos</p>
    </div>

    <div id="main-generator" class="w-full max-w-[440px] bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
        <div id="header-bg" class="p-8 pb-12 text-center relative bg-[#0d9488] transition-all">
            <div class="w-24 h-24 bg-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-xl overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <select id="product-select" onchange="updateApp()" class="w-full bg-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-blue-600 text-center outline-none shadow-xl">
                <option value="tala|#0d9488|#065f46">Tala Préstamos</option>
                <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                <option value="rapidos|#10b981|#047857">Préstamos Rápidos</option>
                <option value="worldmox|#0ea5e9|#0369a1">Worldmoxpro Cash GG</option>
                <option value="movil|#8b5cf6|#6d28d9">Movil Cash</option>
                <option value="talacredito|#0d9488|#065f46">Tala Crédito</option>
            </select>
            <div id="monto-card-bg" class="absolute -bottom-10 left-6 right-6 bg-[#065f46] rounded-[1.5rem] p-6 text-left text-white shadow-2xl transition-all">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">MONTO DE PAGO</span>
                <div class="flex items-center mt-1">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="input-monto">
                </div>
            </div>
        </div>
        <div class="h-16"></div>
        <div class="p-8 space-y-4">
            <div class="flex justify-between border-b pb-2"><span class="text-[11px] font-bold text-slate-400">SUBPRODUCTO</span><span class="text-sm font-bold text-slate-800">Multa</span></div>
            <div class="flex justify-between border-b pb-2"><span class="text-[11px] font-bold text-slate-400">IMPORTE</span><span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span></div>
            <div class="flex justify-between border-b pb-2"><span class="text-[11px] font-bold text-slate-400 uppercase">Fecha Vencimiento</span><input type="date" id="fecha-venc" onchange="calcDays()" class="text-sm font-bold outline-none"></div>
            <div class="flex justify-between border-b pb-2"><span class="text-[11px] font-bold text-slate-400 uppercase">Días Vencimiento</span><span id="days-count" class="text-sm font-bold">0</span></div>
            
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase text-center mb-2">Método de pago</label>
                <select id="metodo-pago" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-sm font-bold text-center outline-none">
                    <option value="STP">STP</option>
                    <option value="BBVA">BBVA</option>
                </select>
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                <label class="block text-[10px] font-bold text-slate-400 uppercase text-center mb-2">Liga de pago</label>
                <select id="liga-select" class="w-full bg-white border border-slate-200 rounded-xl py-2.5 text-xs font-mono font-bold text-blue-600 text-center outline-none">
                    <option value="703010052250010635">703010052250010635</option>
                    <option value="1235132812492191">1235132812492191</option>
                </select>
            </div>
            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#065f46] text-white font-bold py-5 rounded-[1.5rem] shadow-xl uppercase text-xs tracking-widest mt-2 hover:brightness-110 transition-all">Generar Link</button>
        </div>
    </div>

    <script>
        // --- SEGURIDAD ---
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            // USUARIO: admin | CLAVE: 123
            if(u === "admin" && p === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-generator').style.display = 'block';
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        // --- LÓGICA ---
        const logos = {
            'tala': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png',
            'nu': 'https://i.ibb.co/Lzf7vYn/image-45ecfc.png',
            'dida': 'https://i.ibb.co/BccC9Rz/image-46429b.png',
            'worldmox': 'https://i.ibb.co/VvzM47m/image-45e8a1.png',
            'movil': 'https://i.ibb.co/vY8N9zX/image-45e4a2.png',
            'rapidos': 'https://i.ibb.co/vY8N9zX/image-45ec84.png',
            'talacredito': 'https://i.ibb.co/qF6Vvqy/tala-te-presta.png'
        };

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
            document.getElementById('app-logo').src = logos[id];
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-importe').innerText = "$" + parseFloat(val).toLocaleString();
        }

        function calcDays() {
            const fValue = document.getElementById('fecha-venc').value;
            if(!fValue) return;
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const venc = new Date(fValue + 'T00:00:00');
            const diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
            const el = document.getElementById('days-count');
            el.innerText = diff;
            el.style.color = diff < 0 ? "#ef4444" : "#1e293b";
        }

        function confirmar() { alert("✅ Liga generada"); }

        document.getElementById('fecha-venc').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
