<div class="bg-blue-50/50 rounded-[2rem] p-6 border border-blue-100 text-center space-y-3">
    <span id="p-banco" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest block">TRANSFERENCIA (SPEI)</span>
    
    <div onclick="copiarClabe()" class="flex items-center justify-center gap-2 cursor-pointer active:scale-95 transition-transform">
        <div id="p-clabe" class="text-2xl font-black text-blue-700 tracking-tighter">703010052250010635</div>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />

    </div>
    
    <p class="text-[10px] font-bold italic text-blue-400">Toca el número para copiar</p>
</div>

<script>
    function copiarClabe() {
        const clabe = document.getElementById('p-clabe').innerText;
        navigator.clipboard.writeText(clabe).then(() => {
            alert("CLABE copiada: " + clabe);
        });
    }

</script>
