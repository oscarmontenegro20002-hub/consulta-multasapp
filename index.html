<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pagos Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-shadow { box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5); }
        .transition-theme { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[400px] bg-white rounded-[3rem] card-shadow overflow-hidden">
        
        <div id="header-bg" class="bg-sky-400 p-8 pb-16 text-center relative transition-theme">
            
            <div id="logo-box" class="w-20 h-20 bg-white rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-sm p-3">
                <div id="icon-container" class="text-sky-500 w-full h-full">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 000-1.5h-3.75V6z" /></svg>
                </div>
            </div>
            
            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/90 text-[10px] font-bold px-4 py-1.5 rounded-full text-slate-500 mb-6 uppercase">
                Inhabilitar foto
            </button>

            <select id="select-app" onchange="actualizar()" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-blue-600 text-center shadow-sm outline-none">
                <option value="default|#38bdf8|#1d4ed8">-- Seleccionar App --</option>
                <option value="nu|#a855f7|#6b21v8">Préstamos NU</option>
                <option value="dida|#3b82f6|#1d4ed8">DidaPréstamos</option>
                <option value="tala|#10b981|#065f46">Tala Préstamos</option>
                <option value="worldmox|#0ea5e9|#0369a1">Worldmoxpro Cash GG</option>
                <option value="movil|#8b5cf6|#4c1d95">Movil Cash</option>
                <option value="rapidos|#ef4444|#991b1b">Préstamos Rápidos</option>
            </select>
            
            <div id="monto-banner" class="absolute -bottom-10 left-6 right-6 bg-blue-700 rounded-2xl p-6 text-left shadow-xl z-20 transition-theme">
                <p class="text-white/70 text-[10px] uppercase font-bold mb-1">Monto del Préstamo</p>
                <div class="flex items-center">
                    <span class="text-white text-4xl font-bold mr-1">$</span>
                    <input type="number" id="val-monto" oninput="sync()" placeholder="0.00" class="bg-transparent text-white text-4xl font-bold outline-none w-full">
                </div>
            </div>
        </div>

        <div class="h-14"></div>

        <div class="p-8 space-y-4">
            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400">Subproducto</span>
                <select class="text-sm font-bold bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Bloqueo WhatsApp</option>
                    <option>Liquidación Total</option>
                    <option>Intereses</option>
                </select>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400">Importe a Pagar</span>
                <span id="res-importe" class="text-sm font-bold">$0.00</span>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400">Vencimiento</span>
                <input type="date" class="text-sm font-bold bg-transparent outline-none">
            </div>

            <div class="bg-slate-50 rounded-3xl p-6 text-center border mt-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Liga de pago</p>
                <p id="res-link" class="text-xs text-blue-500 font-mono break-all font-bold">0000000000</p>
            </div>

            <div class="space-y-2">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm border-b p-1 outline-none">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b p-1 outline-none">
            </div>

            <button onclick="generar()" id="btn-gen
