<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Pagos Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .transition-all { transition: all 0.4s ease; }
        .card-shadow { box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.45); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[400px] bg-white rounded-[3rem] card-shadow overflow-hidden">
        <div id="header-bg" class="bg-[#1d4ed8] p-8 pb-16 text-center relative transition-all">
            
            <div class="w-24 h-24 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-md overflow-hidden p-1">
                <img id="app-logo" src="" class="w-full h-full object-contain">
            </div>

            <button onclick="toggleFoto()" id="btn-foto" class="bg-white/20 text-white text-[10px] font-bold px-4 py-1.5 rounded-full uppercase mb-6 hover:bg-white/30 transition-all">
                Inhabilitar Foto
            </button>

            <div class="relative z-10">
                <select id="select-app" onchange="updateApp()" class="w-full bg-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-slate-800 shadow-lg outline-none cursor-pointer appearance-none text-center">
                    <option value="default|#334155|#1e293b">Seleccionar Producto</option>
                    <option value="nu|#820ad1|#581c87">Préstamos Nu</option>
                    <option value="dida|#2563eb|#1d4ed8">DiDa Préstamos</option>
                    <option value="tala|#00d3a1|#00a37d">Tala Préstamos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">WorldmoxPro Cash GG</option>
                    <option value="movil|#8b5cf6|#6d28d9">Movil Cash</option>
                </select>
            </div>

            <div id="monto-bg" class="absolute -bottom-10 left-6 right-6 bg-[#1e3a8a] rounded-2xl p-6 text-left shadow-xl transition-all">
                <p class="text-white/60 text-[10px] uppercase font-bold tracking-widest mb-1">Monto de Pago</p>
                <div class="flex items-center text-white">
                    <span class="text-4xl font-bold">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="bg-transparent text-4xl font-bold outline-none w-full placeholder:text-white/20">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-5">
            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400 font-medium">Subproducto</span>
                <select class="text-sm font-bold text-slate-700 bg-transparent outline-none">
                    <option>Multa</option>
                    <option>Recargo</option>
                    <option>Paz y Salvo</option>
                    <option>Liquidación Total</option>
                </select>
            </div>

            <div class="flex justify-between border-b pb-2">
                <span class="text-sm text-slate-400 font-medium">Importe a Pagar</span>
                <span id="display-monto" class="text-sm font-bold text-slate-800">$0.00</span>
            </div>

            <div class="bg-slate-50 rounded-3xl p-6 text-center border border-slate-100 mt-4">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Referencia Generada</p>
                <p id="display-link" class="text-xs font-mono font-bold text-blue-600">https://pago.mx/REF-XXXXX</p>
            </div>

            <div class="space-y-3 pt-2">
                <input type="text" placeholder="Nombre del cliente" class="w-full text-sm border-b border-slate-100 pb-2 outline-none focus:border-blue-500 transition-all">
                <input type="text" placeholder="Teléfono" class="w-full text-sm border-b border-slate-100 pb-2 outline-none focus:border-blue-500 transition-all">
            </div>

            <button onclick="generar()" id="btn-main" class="w-full bg-[#1e3a8a] text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">
                Confirmar y Generar Link
            </button>
        </div>
    </div>

    <script>
        let fotoVisible = true;

        // LOGOS REALES (EXTRACTOS DE TUS IMÁGENES)
        const logos = {
            'nu': 'https://i.ibb.co/Lzf7vYn/image-45ecfc.png', // Logo Nu real
            'dida': 'https://i.ibb.co/BccC9Rz/image-46429b.png', // Logo DiDa real
            'tala': 'https://i.ibb.co/vY8N9zX/image-45ec84.png', // Logo Tala real
            'worldmox': 'https://i.ibb.co/VvzM47m/image-45e8a1.png', // La W de colores
            'movil': 'https://i.ibb.co/vY8N9zX/image-45e4a2.png', // La M azul/morada
            'default': 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23cbd5e1"%3E%3Cpath stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/%3E%3C/svg%3E'
        };

        function updateApp() {
            const [id, c1, c2] = document.getElementById('select-app').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
            
            const img = document.getElementById('app-logo');
            if(fotoVisible) {
                img.src = logos[id] || logos['default'];
                img.style.opacity = "1";
            } else {
                img.src = logos['default'];
                img.style.opacity = "0.3";
            }
        }

        function toggleFoto() {
            fotoVisible = !fotoVisible;
            document.getElementById('btn-foto').innerText = fotoVisible ? "Inhabilitar Foto" : "Habilitar Foto";
            updateApp();
        }

        function syncMonto() {
            const val = document.getElementById('input-monto').value || "0.00";
            document.getElementById('display-monto').innerText = "$" + parseFloat(val).toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function generar() {
            const ref = Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('display-link').innerText = "https://pago.mx/REF-" + ref;
            alert("✅ Liga generada con éxito.");
        }

        // Iniciar con logo por defecto
        updateApp();
    </script>
</body>
</html>
