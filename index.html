<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pagos - Acceso Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; margin: 0; }
        .card-container { width: 100%; max-width: 440px; background: white; border-radius: 2.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .hidden-content { display: none !important; }
        .input-monto { background: transparent; border: none; outline: none; width: 100%; color: white; font-weight: 700; font-size: 2rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-screen" class="w-full max-w-sm bg-white p-10 rounded-[2.5rem] shadow-2xl text-center">
        <div class="w-20 h-20 bg-[#0d9488] rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Acceso Seguro</h2>
        <p class="text-slate-400 text-sm mb-8">Ingresa tus credenciales para continuar</p>
        
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Usuario" class="w-full px-5 py-3.5 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:border-[#0d9488] transition-all font-medium">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full px-5 py-3.5 rounded-2xl border border-slate-100 bg-slate-50 outline-none focus:border-[#0d9488] transition-all font-medium">
            <button onclick="checkAccess()" class="w-full bg-[#0d9488] text-white font-bold py-4 rounded-2xl hover:bg-[#065f46] shadow-lg transition-all active:scale-95">
                Entrar al Sistema
            </button>
        </div>
        <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden">❌ Usuario o contraseña incorrectos</p>
    </div>

    <div id="main-generator" class="card-container hidden-content">
        <div id="header-bg" class="p-8 pb-12 text-center relative bg-[#0d9488] transition-all duration-500">
            <div class="w-24 h-24 bg-white rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-xl overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            
            <button onclick="toggleFoto()" class="bg-white/20 hover:bg-white/30 text-[10px] font-bold px-5 py-1.5 rounded-full text-white uppercase mb-5 backdrop-blur-sm transition-all">Inhabilitar Foto</button>

            <div class="relative max-w-[300px] mx-auto z-10">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white border-none rounded-2xl px-4 py-3 text-sm font-bold text-blue-600 text-center outline-none shadow-xl">
                    <option value="tala|#0d9488|#065f46">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                    <option value="rapidos|#10b981|#047857">Préstamos Rápidos</option>
                    <option value="worldmox|#0ea5e9|#0369a1">Worldmoxpro Cash GG</option>
                    <option value="movil|#8b5cf6|#6d28d9">Movil Cash</option>
                    <option value="talacredito|#0d9488|#065f46">Tala Crédito</option>
                </select>
            </div>

            <div id="monto-card-bg" class="absolute -bottom-10 left-6 right-6 bg-[#065f46] rounded-[1.5rem] p-6 text-left text-white shadow-2xl transition-all duration-500">
                <span class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Monto de Pago</span>
                <div class="flex items-center mt-1">
                    <span class="text-4xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" oninput="syncMonto()" placeholder="0.00" class="input-monto placeholder:text-white/20">
                </div>
            </div>
        </div>

        <div class="h-16"></div>

        <div class="p-8 space-y-4">
            <div class="space-y-3 border-b border-slate-100 pb-4">
                <div class="flex justify-between items-center"><span class="text-[11px] font-bold text-slate-400 uppercase">Subproducto</span><span class="text-sm font-bold text-slate-800">Multa</span></div>
                <div class="flex justify-between items-center"><span class="text-[11px] font-bold text-slate-400 uppercase">Importe</span><span id="display-importe" class="text-sm font-bold text-slate-800">$0.00</span></div>
                <div class="flex justify-between items-center"><span class="text-[11px] font-bold
